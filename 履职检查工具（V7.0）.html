<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>建设工程安全责任人员履职检查系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            line-height: 1.8; 
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 15px; }
        
        /* 头部样式 */
        .header { 
            background: white; 
            color: #333; 
            padding: 20px 25px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .header h1 { 
            font-size: 22px; 
            margin-bottom: 8px; 
            color: #667eea;
            font-weight: 700;
        }
        .header p { 
            color: #666; 
            font-size: 14px;
        }
        
        /* 信息栏样式 */
        .info-bar { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
        }
        .info-item label { 
            display: block; 
            font-size: 13px; 
            color: #666; 
            margin-bottom: 6px; 
            font-weight: 600;
        }
        .info-item input, .info-item select { 
            width: 100%; 
            padding: 10px 12px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 14px;
            transition: all 0.3s;
        }
        .info-item input:focus, .info-item select:focus { 
            outline: none; 
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        /* 导航标签样式 */
        .nav-tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 15px; 
            flex-wrap: wrap; 
            justify-content: center;
            overflow-x: auto;
            padding: 10px 0;
        }
        .nav-tab { 
            padding: 12px 20px; 
            background: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            transition: all 0.3s;
            color: #555;
            white-space: nowrap;
        }
        .nav-tab.active { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        .nav-tab:hover:not(.active) { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        /* 表格容器样式 */
        .table-container { 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            margin-bottom: 15px;
        }
        .table-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .table-header h2 {
            font-size: 20px;
            color: #333;
            font-weight: 700;
        }
        
        /* 进度条样式 */
        .progress-bar { 
            flex: 1; 
            min-width: 200px; 
            max-width: 350px;
        }
        .progress-track { 
            background: #e0e0e0; 
            border-radius: 12px; 
            height: 20px; 
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #667eea, #764ba2); 
            transition: width 0.5s; 
            border-radius: 12px;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-text { 
            font-size: 13px; 
            color: #666; 
            margin-top: 6px;
            font-weight: 600;
        }
        
        /* 筛选按钮样式 */
        .filter-bar { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
        }
        .filter-btn { 
            padding: 8px 16px; 
            border: 2px solid #e0e0e0; 
            background: white; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }
        .filter-btn.active { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
        .filter-btn:hover:not(.active) { 
            border-color: #667eea;
            color: #667eea;
        }
        
        /* 检查项样式 */
        .inspection-item { 
            border: 2px solid #e8e8e8; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            background: linear-gradient(135deg, #fafbfc 0%, #f5f7fa 100%);
            transition: all 0.3s;
            position: relative;
        }
        .inspection-item:hover { 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #667eea;
            transform: translateY(-2px);
        }
        .inspection-item[data-status="compliant"] {
            border-left: 5px solid #4caf50;
        }
        .inspection-item[data-status="noncompliant"] {
            border-left: 5px solid #f44336;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%);
        }
        .inspection-item[data-status="notapplicable"] {
            border-left: 5px solid #9e9e9e;
        }
        
        /* 项目标题样式 */
        .item-header { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 20px; 
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .item-id { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 700; 
            white-space: nowrap;
            box-shadow: 0 3px 10px rgba(102,126,234,0.3);
        }
        .item-title { 
            font-size: 16px; 
            font-weight: 700; 
            color: #333; 
            flex: 1;
            line-height: 1.5;
            min-width: 250px;
        }
        .item-title[contenteditable="true"]:focus {
            outline: 2px solid #667eea;
            background: #f0f3ff;
            border-radius: 6px;
            padding: 5px;
        }
        
        /* 编辑按钮样式 */
        .edit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
            transition: all 0.3s;
        }
        .edit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(102,126,234,0.4);
        }
        .edit-btn.active {
            background: linear-gradient(135deg, #4caf50 0%, #8bc34a 100%);
        }
        
        /* 下一项按钮样式 */
        .next-item-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            width: 100%;
            justify-content: center;
        }
        .next-item-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(17,153,142,0.4);
        }
        
        /* 详情区域样式 */
        .item-details { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .detail-section { 
            background: white; 
            padding: 18px; 
            border-radius: 10px; 
            border-left: 4px solid #667eea;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .detail-section:hover {
            box-shadow: 0 5px 25px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }
        .detail-section h4 { 
            font-size: 15px; 
            color: #667eea; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            font-weight: 700;
        }
        .detail-section ul { 
            font-size: 14px; 
            color: #444; 
            padding-left: 20px; 
            line-height: 1.8;
        }
        .detail-section li { 
            margin-bottom: 8px;
            position: relative;
        }
        .detail-section li::marker {
            color: #667eea;
            font-weight: bold;
        }
        .detail-section p { 
            font-size: 14px; 
            color: #444; 
            line-height: 1.8;
        }
        
        /* 常见问题样式 - 修复BUG关键 */
        .common-issues-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        .issue-tag { 
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%); 
            color: #856404; 
            padding: 6px 12px; 
            border-radius: 16px; 
            font-size: 13px; 
            font-weight: 600;
            display: flex; 
            align-items: center; 
            gap: 6px; 
            cursor: pointer; 
            transition: all 0.3s;
            border: 2px solid #ffc107;
            user-select: none;
        }
        .issue-tag:hover { 
            background: linear-gradient(135deg, #ffc107 0%, #ffdb4d 100%); 
            color: white;
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(255,193,7,0.4);
        }
        .issue-tag.auto-noncompliant {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
            color: white;
            border-color: #d32f2f;
        }
        .issue-tag .remove-btn { 
            background: none; 
            border: none; 
            color: #856404; 
            cursor: pointer; 
            font-size: 14px; 
            padding: 0 3px;
            font-weight: bold;
        }
        .issue-tag.auto-noncompliant .remove-btn {
            color: white;
        }
        .issue-tag .remove-btn:hover { 
            color: #dc3545;
        }
        .add-issue-input { 
            display: flex; 
            gap: 6px; 
            width: 100%; 
            margin-top: 10px; 
        }
        .add-issue-input input { 
            flex: 1; 
            padding: 8px 12px; 
            border: 2px solid #ddd; 
            border-radius: 16px; 
            font-size: 13px;
            transition: all 0.3s;
        }
        .add-issue-input input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .add-issue-input button { 
            padding: 8px 16px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .add-issue-input button:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(102,126,234,0.4);
        }
        
        /* 检查结果样式 */
        .item-result { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px; 
            flex-wrap: wrap; 
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
        }
        .item-result label { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            padding: 10px 18px; 
            border-radius: 25px; 
            border: 2px solid #e0e0e0; 
            transition: all 0.3s; 
            font-size: 14px;
            font-weight: 600;
        }
        .item-result label:hover { 
            border-color: #667eea;
            background: #f0f3ff;
        }
        .item-result label:has(input:checked) { 
            border-color: #667eea; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        .item-result input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }
        
        /* 备注区域样式 */
        .item-remark textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 14px; 
            resize: vertical; 
            min-height: 80px; 
            font-family: inherit;
            line-height: 1.6;
            transition: all 0.3s;
        }
        .item-remark textarea:focus { 
            outline: none; 
            border-color: #667eea; 
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        /* 汇总面板样式 */
        .summary-panel { 
            background: white; 
            border-radius: 15px; 
            padding: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            margin-bottom: 15px;
        }
        .summary-panel h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
        }
        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        .summary-card { 
            text-align: center; 
            padding: 20px 15px; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); 
            border-radius: 12px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .summary-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .summary-card.highlight { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white;
        }
        .summary-card.danger { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); 
            color: white;
        }
        .summary-card.success { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            color: white;
        }
        .summary-value { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .summary-label { 
            font-size: 13px; 
            opacity: 0.95;
            font-weight: 600;
        }
        
        /* 不符合项列表样式 */
        .noncompliant-list { 
            background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%); 
            border: 2px solid #feb2b2; 
            border-radius: 12px; 
            padding: 20px; 
            margin-top: 20px;
        }
        .noncompliant-list h3 { 
            color: #c53030; 
            margin-bottom: 15px; 
            font-size: 17px;
            font-weight: 700;
        }
        
        .responsibility-group {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #f44336;
        }
        .responsibility-group h4 {
            color: #c53030;
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .responsibility-group .issue-count {
            background: #f44336;
            color: white;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }
        .noncompliant-item { 
            background: linear-gradient(135deg, #fafbfc 0%, #f5f7fa 100%);
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            border-left: 4px solid #f56565;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .noncompliant-item:hover {
            box-shadow: 0 5px 25px rgba(0,0,0,0.12);
            transform: translateX(5px);
        }
        .noncompliant-item strong {
            font-size: 14px;
            color: #c53030;
        }
        .noncompliant-item .item-detail {
            font-size: 13px;
            color: #555;
            margin-top: 6px;
            line-height: 1.5;
        }
        .noncompliant-item .item-remark {
            font-size: 12px;
            color: #c53030;
            margin-top: 6px;
            font-style: italic;
        }
        .no-issues { 
            color: #38a169; 
            text-align: center; 
            padding: 25px;
            font-size: 16px;
            font-weight: 600;
        }
        
        /* 操作按钮样式 */
        .action-bar { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-top: 20px;
            justify-content: center;
        }
        .action-btn { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 700; 
            transition: all 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        .action-btn.primary { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white;
        }
        .action-btn.success { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
            color: white;
        }
        .action-btn.warning { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); 
            color: white;
        }
        .action-btn.info { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            color: white;
        }
        .action-btn.danger {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
            color: white;
        }
        .action-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        
        /* 导航按钮样式 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }
        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn.prev {
            background: #e0e0e0;
            color: #666;
        }
        .nav-btn.next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 快速导航按钮 */
        .quick-nav {
            position: fixed;
            right: 20px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }
        .quick-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .quick-btn.top {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .quick-btn.bottom {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .quick-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        
        /* 底部固定导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 10px 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            z-index: 999;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .bottom-nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .bottom-nav-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .bottom-nav-btn.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

                {id:"1.10",title:"竣工验收组织：是否及时组织竣工验收",methods:["1.查阅竣工验收报告及验收记录","2.核对竣工报告收到日期与验收组织日期","3.查阅竣工验收备案表"],tips:["验收组织：建设单位组织，五方责任主体参加","验收条件：完成设计内容、资料齐全、检测合格","验收程序：查验收通知、会议记录、意见"],commonIssues:["未验收先交付","验收流于形式","验收人员资格不符"],regulations:"《建设工程质量管理条例》第十六条；《房屋建筑和市政基础设施工程竣工验收规定》"},
                {id:"1.11",title:"档案管理：是否建立质量终身责任信息档案并移交",methods:["1.查阅工程档案目录及归档记录","2.查阅质量终身责任信息档案","3.核对档案移交城建档案馆的回执"],tips:["终身责任档案：五方责任主体项目负责人信息、承诺书","档案完整性：查归档目录与应归档清单比对","移交时限：竣工验收后3个月内"],commonIssues:["档案缺失","终身责任信息不全","移交超期"],regulations:"《建设工程质量管理条例》第二十一条；《建设工程文件归档规范》GB/T50328"},
                {id:"1.12",title:"禁止未验先用：未经验收合格的工程是否擅自交付使用",methods:["1.现场查看工程使用状态","2.查阅物业移交记录、业主入住记录","3.核对竣工验收备案时间与实际使用时间"],tips:["使用痕迹识别：查水电费缴纳、物业收费、装修许可","入住证据：查门禁卡、快递收件、网络开通记录","现场观察：查办公、居住、经营痕迹"],commonIssues:["以试运行名义提前使用","部分楼层提前交付","以办公需要名义提前入驻"],regulations:"《建设工程质量管理条例》第五十八条；《建筑法》第六十一条"}

            table2: [
                {id:"2.1",title:"执业资格与在岗履职：是否取得执业资格和安全考核证书",methods:["1.查阅建造师注册证书、安全B证原件","2.通过全国建筑市场监管平台查询","3.查阅考勤记录、会议签到、带班记录","4.查询名下其他项目任职情况"],tips:["证书查验：必须看原件，当场用手机查询","在岗核实：查签字文件、现场询问项目情况","挂证识别：查社保、工资发放、工作地点"],commonIssues:["证书挂靠","长期不在岗","同时担任多个项目经理","签字代签"],regulations:"《建筑施工项目经理质量安全责任十项规定》一；《注册建造师管理规定》"},

                {id:"2.6",title:"取样检测：是否组织涉及结构安全的试块试件取样检测",methods:["1.查阅见证取样送检记录","2.核对检测报告编号与送检记录","3.通过检测机构信息系统查询报告真伪","4.查阅见证人员资格证书"],tips:["见证要求：见证人员必须持证，比例符合规定","报告查询：必须通过官网或系统查询","取样真实性：查取样时间、地点、人员、照片"],commonIssues:["试块造假","检测报告造假","见证人员无证","送检比例不足"],regulations:"《建筑施工项目经理质量安全责任十项规定》四；《建设工程质量管理条例》第三十一条"},
                {id:"2.7",title:"隐蔽工程验收：是否组织隐蔽工程验收",methods:["1.查阅隐蔽工程验收记录及影像资料","2.核对验收人员签字","3.查阅分部工程验收记录","4.比对施工日志与验收时间"],tips:["影像资料：查隐蔽前照片（带时间水印）","签字核实：对比同一人多处签字","时间逻辑：隐蔽验收必须在隐蔽前"],commonIssues:["未验收先隐蔽","验收记录后补","影像资料缺失或造假","签字代签"],regulations:"《建筑施工项目经理质量安全责任十项规定》五；《建筑工程施工质量验收统一标准》GB50300"},

                {id:"2.11",title:"防护用品与淘汰设备：作业人员是否配备防护用品",methods:["1.现场抽查作业人员防护用品佩戴","2.查阅防护用品发放记录","3.对照住建部淘汰目录检查现场设备","4.查阅设备进场验收记录"],tips:["防护用品：查安全帽、安全带、安全网三宝","淘汰目录：对照住建部最新版淘汰目录","现场识别：查设备铭牌、生产日期、型号"],commonIssues:["防护用品不合格","使用淘汰设备","防护用品发放不足","作业人员不佩戴"],regulations:"《建筑施工项目经理质量安全责任十项规定》七；《建设工程安全生产管理条例》第三十四条"},

                {id:"2.14",title:"事故报告与应急救援：是否按规定报告事故",methods:["1.查阅事故报告记录及时间戳","2.查阅应急预案演练记录","3.查阅事故处置记录","4.访谈相关人员了解应急处置过程"],tips:["报告时限：1小时内向主管部门报告","预案演练：查年度计划、记录、评估报告","处置记录：查调查、处理、整改记录"],commonIssues:["事故瞒报、迟报","预案未演练","应急处置不当","事故整改不彻底"],regulations:"《建筑施工项目经理质量安全责任十项规定》十；《生产安全事故报告和调查处理条例》第九条"},

                {id:"2.17",title:"意外伤害保险：是否为危险作业人员办理意外伤害保险",methods:["1.查阅建筑意外伤害保险保单原件","2.核对参保人员名单与现场作业人员","3.查阅保险缴费凭证","4.核对保险有效期与施工工期"],tips:["保单核实：查保险公司资质、保单真伪","人员覆盖：查参保人员是否覆盖全部作业人员","有效期：查保险有效期是否覆盖整个施工期"],commonIssues:["未办理保险","保险过期","参保人员不足","保单造假"],regulations:"《建设工程安全生产管理条例》第三十八条；《建筑法》第四十八条"}

                {id:"3.1",title:"人员配备与考核：是否按规定数量配备专职安全员",methods:["1.查阅专职安全员任命文件","2.查阅安全生产考核合格证书（C证）原件","3.通过住建部门系统查询证书有效性","4.核对配备数量是否符合工程规模要求"],tips:["配备标准：1万平以下1人，1-5万平2人，5万平以上3人","证书查询：当场用手机登录系统查询","人证核对：查证书照片与本人是否一致"],commonIssues:["配备数量不足","证书过期或无效","人证分离（挂靠）","专职安全员兼任其他职务"],regulations:"《建设工程安全生产管理条例》第二十三条；《建筑施工企业安全生产管理机构设置及专职安全生产管理人员配备办法》"},
                {id:"3.2",title:"日常安全检查：是否每天开展安全检查",methods:["1.查阅安全员日常检查日志","2.核对检查频次是否每日","3.查阅危大工程施工期间监督记录","4.比对施工日志与安全检查记录"],tips:["日志真实性：查笔迹、记录详细程度","时间验证：查记录时间与施工时间是否匹配","危大监督：查监督时间是否覆盖整个施工过程"],commonIssues:["日志集中补做","检查流于形式","危大工程施工期间无监督记录","发现问题未跟踪整改"],regulations:"《建筑施工企业主要负责人、项目负责人和专职安全生产管理人员安全生产管理规定》第二十条；《建筑施工安全检查标准》JGJ59"},
                {id:"3.3",title:"隐患处理与报告：发现隐患是否立即处理",methods:["1.查阅隐患整改通知单","2.核对隐患处理时间","3.查阅不能处理隐患的上报记录","4.查阅企业安全管理机构回复记录"],tips:["处理时效：一般隐患立即处理，重大隐患立即报告","报告路径：安全员向项目经理向企业安全机构向主管部门","报告形式：查书面报告、邮件、系统上报"],commonIssues:["隐患未及时处理","重大隐患瞒报","报告无书面记录","企业无回复记录"],regulations:"《安全生产事故隐患排查治理暂行规定》"},
                {id:"3.4",title:"违章制止：是否制止和纠正违章指挥行为",methods:["1.查阅违章行为制止记录","2.查阅违章处理台账","3.访谈作业人员了解违章制止情况","4.查阅违章处罚记录"],tips:["制止记录：查时间、地点、人员、违章内容、处理措施","处罚验证：查处罚通知、罚款收据、整改记录","访谈技巧：分别访谈不同班组作业人员"],commonIssues:["无违章制止记录","记录过于简单","只记录不处理","对管理人员违章不敢制止"],regulations:"《建设工程安全生产管理条例》第二十三条；《安全生产法》第五十一条"},
                {id:"3.5",title:"制度与预案参与：是否参与拟订安全生产规章制度",methods:["1.查阅安全生产规章制度编制记录","2.查阅操作规程编制参与记录","3.查阅应急预案编制会议纪要","4.核对安全员签字"],tips:["编制参与：查编制人员名单、会议纪要、签字","制度内容：查是否针对本项目特点","预案评审：查评审记录、专家意见、修改记录"],commonIssues:["制度照搬模板","安全员未参与编制","预案未评审","制度未培训宣贯"],regulations:"《安全生产法》第二十五条；《生产安全事故应急预案管理办法》"},
                {id:"3.6",title:"教育培训：是否组织或参与安全生产教育和培训",methods:["1.查阅年度安全教育培训计划","2.查阅培训签到表及考核记录","3.查阅离岗/换岗人员培训记录","4.查阅培训影像资料"],tips:["培训计划：查年度、月度、专项培训计划","签到核实：对比签到笔迹","考核验证：查考核试卷、成绩、补考记录"],commonIssues:["培训记录造假","培训时间不足","无考核或考核流于形式","离岗换岗未培训"],regulations:"《安全生产法》第二十五条；《建设工程安全生产管理条例》第三十七条"},
                {id:"3.7",title:"风险辨识与管控：是否开展安全风险和危险源辨识",methods:["1.查阅安全风险辨识清单","2.查阅风险评估报告","3.查阅风险分级管控台账","4.查阅重大危险源监控记录"],tips:["辨识全面性：查是否覆盖所有作业活动、设备设施、场所","评估方法：查评估方法是否科学","分级管控：查红橙黄蓝四色风险分布图"],commonIssues:["风险辨识不全","评估方法不当","管控措施不落实","风险清单未动态更新"],regulations:"《安全生产法》第二十五条；《安全生产风险分级管控体系通则》"},
                {id:"3.8",title:"应急演练：是否组织或参与应急救援演练",methods:["1.查阅年度应急演练计划","2.查阅演练记录及影像资料","3.查阅演练评估报告","4.查阅演练后改进措施记录"],tips:["演练频次：综合预案每年至少1次，专项预案每半年至少1次","演练真实性：查演练照片、视频记录","评估报告：查评估内容、发现问题、改进建议"],commonIssues:["演练频次不足","演练记录造假","无评估报告","改进措施未落实"],regulations:"《安全生产法》第二十五条；《生产安全事故应急预案管理办法》第三十三条"},
                {id:"3.9",title:"全面检查：是否每月至少组织一次安全生产全面检查",methods:["1.查阅月度全面检查记录","2.核对检查频次","3.查阅隐患清单及整改建议","4.查阅检查人员签字"],tips:["检查组织：查检查组成员","检查范围：查是否覆盖全场区、所有作业面","隐患清单：查隐患描述是否具体、整改建议是否可行"],commonIssues:["检查频次不足","检查范围不全","隐患描述笼统","签字代签"],regulations:"《建筑施工安全检查标准》JGJ59；《安全生产事故隐患排查治理暂行规定》"},
                {id:"3.10",title:"整改督促与考核：是否督促履行安全生产职责",methods:["1.查阅整改督促记录","2.查阅整改复查记录","3.查阅安全生产考核记录","4.查阅考核结果应用记录"],tips:["督促记录：查督促时间、方式、对象、内容","复查验证：查复查时间、人员、结论","考核内容：查考核指标、周期、结果"],commonIssues:["督促无记录","复查流于形式","考核指标不合理","考核结果未应用"],regulations:"《安全生产法》第二十五条"},
                {id:"3.11",title:"设备设施管理：是否建立安全防护用具及设备管理档案",methods:["1.查阅安全防护用具台账","2.查阅设备维修保养记录","3.查阅设备检查记录","4.对照淘汰目录检查现场设备"],tips:["台账完整：查设备名称、型号、编号、进场时间、检验状态","维保记录：查维保时间、内容、人员、验收","检查频次：查日检、周检、月检记录"],commonIssues:["台账不全","维保记录缺失","检查频次不足","使用淘汰设备"],regulations:"《建设工程安全生产管理条例》第三十四条；《劳动防护用品监督管理规定》"},
                {id:"3.12",title:"危险作业监护：危险作业时是否安排专门人员进行现场安全管理",methods:["1.查阅危险作业审批单","2.查阅现场监护人员安排记录","3.现场检查监护人员在岗情况","4.查阅监护记录"],tips:["作业审批：查审批流程、人员、时间（必须在作业前）","监护人员：查资格、培训记录、在岗情况","现场核实：现场检查时核实监护人员是否在场"],commonIssues:["无审批先作业","监护人员不在岗","监护人员无资格","监护记录缺失"],regulations:"《安全生产法》第四十三条；《危险化学品企业特殊作业安全规范》GB30871"},
                {id:"3.13",title:"重大危险源管理：重大危险源是否登记建档",methods:["1.查阅重大危险源登记档案","2.查阅检测评估报告","3.查阅监控记录","4.查阅责任人任命文件"],tips:["辨识标准：查重大危险源辨识是否符合国家标准","登记建档：查档案内容","检测评估：查检测频次、评估报告、备案记录"],commonIssues:["重大危险源未辨识","档案不全","检测评估超期","责任人不明确"],regulations:"《安全生产法》第三十七条；《危险化学品重大危险源监督管理暂行规定》"},
                {id:"3.14",title:"信息通报：事故隐患排查治理情况是否向从业人员通报",methods:["1.查阅职工大会/职代会会议纪要","2.查阅信息公示栏照片","3.查阅通报记录","4.访谈从业人员了解知情情况"],tips:["通报频次：查是否定期通报（至少每季度）","通报内容：查隐患数量、类型、整改情况、预防措施","公示验证：查公示栏位置、内容、更新时间"],commonIssues:["未定期通报","通报内容不完整","公示栏位置不显眼","作业人员不知情"],regulations:"《安全生产法》第三十八条；《企业安全生产信息公开规定》"},
                {id:"3.15",title:"班组与班前检查：班组每周是否至少开展一次安全检查",methods:["1.查阅班组安全检查记录","2.查阅班前检查记录","3.核对检查频次","4.查阅检查人员签字"],tips:["班组检查：查检查时间、内容、人员、问题整改","班前检查：查班前会记录、岗位检查表、签字确认","频次核实：查记录时间是否连续、是否有遗漏"],commonIssues:["班组检查频次不足","班前检查流于形式","记录补做","签字代签"],regulations:"《建筑施工安全检查标准》JGJ59；《企业安全生产标准化基本规范》GB/T33000"}
            ],
            table4: [
                {id:"4.1",title:"总监资格与履职：是否取得注册执业资格，是否在岗履职",methods:["1.查阅注册监理工程师证书原件","2.通过全国建筑市场监管平台查询","3.查阅考勤记录","4.查询名下其他项目任职情况"],tips:["证书查验：必须看原件，当场用手机查询","注册信息：查注册专业、单位、有效期","多项目任职：平台查询同一人注册项目数量（不得超过3个）"],commonIssues:["证书挂靠","长期不在岗","同时担任过多项目总监","签字代签"],regulations:"《建筑工程项目总监理工程师质量安全责任六项规定》一；《注册监理工程师管理规定》"},

                {id:"4.5",title:"特种人员核查：是否督促落实持证上岗制度",methods:["1.查阅特种作业人员资格报审表","2.通过应急管理部官网查询证书真伪","3.查阅核查记录","4.现场抽查持证上岗情况"],tips:["特种作业证书查询：https://cx.mem.gov.cn/","证书查询：必须当场通过官网查询","人证核对：查证书照片与本人是否一致"],commonIssues:["证书造假","证书过期","人证不符","无证上岗"],regulations:"《特种作业人员安全技术培训考核管理规定》"},
                {id:"4.6",title:"监理实施方式：是否组织监理人员采取旁站、巡视和平行检验",methods:["1.查阅监理日志","2.查阅旁站记录","3.查阅巡视记录","4.查阅平行检验记录","5.核对实施频次"],tips:["旁站：查危大工程、关键部位是否有旁站记录","巡视：查巡视频次、巡视内容、发现问题","平行检验：查检验项目、检验结果、签字记录"],commonIssues:["旁站记录缺失","巡视频次不足","平行检验未做","记录不一致"],regulations:"《建筑工程项目总监理工程师质量安全责任六项规定》三；《建设工程监理规范》GB/T50319"},

        // 责任人员名称映射
        const responsibilityNames = {
            table1: '建设单位项目负责人',
            table2: '施工单位项目经理',
            table3: '专职安全员',
            table4: '总监理工程师',
            table5: '安全专业监理工程师'
        };

        // 当前表格索引
        let currentTableIndex = 0;
        const tableOrder = ['table1', 'table2', 'table3', 'table4', 'table5'];

        // 自定义常见问题管理 - 修复BUG版本
        class CommonIssueManager {
            constructor() {
                this.customIssues = JSON.parse(localStorage.getItem('customCommonIssues')) || {};
            }

            // 生成唯一ID用于事件绑定
            generateIssueId(tableId, itemId, issue) {
                return `issue_${tableId}_${itemId}_${this.hashCode(issue)}`;
            }

            // 简单哈希函数
            hashCode(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return Math.abs(hash).toString(36);
            }

            addIssue(tableId, itemId, issue) {
                if (!this.customIssues[tableId]) this.customIssues[tableId] = {};
                if (!this.customIssues[tableId][itemId]) this.customIssues[tableId][itemId] = [];
                if (!this.customIssues[tableId][itemId].includes(issue)) {
                    this.customIssues[tableId][itemId].push(issue);
                    this.save();
                    this.renderIssueInput(tableId, itemId);
                }
            }

            removeIssue(tableId, itemId, issue) {
                if (this.customIssues[tableId] && this.customIssues[tableId][itemId]) {
                    this.customIssues[tableId][itemId] = this.customIssues[tableId][itemId].filter(i => i !== issue);
                    this.save();
                    this.renderIssueInput(tableId, itemId);
                }
            }

            save() {
                localStorage.setItem('customCommonIssues', JSON.stringify(this.customIssues));
            }

            getIssues(tableId, itemId) {
                const defaultIssues = inspectionData[tableId]?.find(i => i.id === itemId)?.commonIssues || [];
                const customIssues = this.customIssues[tableId]?.[itemId] || [];
                return [...defaultIssues, ...customIssues];
            }

            // 修复BUG：使用data属性而非onclick内联函数
            renderIssueInput(tableId, itemId) {
                const container = document.querySelector(`[data-table="${tableId}"][data-item="${itemId}"] .common-issues-container`);
                if (!container) return;
                const issues = this.getIssues(tableId, itemId);
                
                container.innerHTML = issues.map(issue => {
                    const issueId = this.generateIssueId(tableId, itemId, issue);
                    const isCustom = this.customIssues[tableId]?.[itemId]?.includes(issue);
                    return `
                        <span class="issue-tag" data-issue="${this.escapeHtml(issue)}" data-table="${tableId}" data-item="${itemId}" onclick="handleIssueClick(this)">
                            ${this.escapeHtml(issue)}
                            ${isCustom ? `<button class="remove-btn" onclick="handleRemoveIssue(event, '${tableId}', '${itemId}', '${this.escapeHtml(issue)}')">×</button>` : ''}
                        </span>
                    `;
                }).join('') + `
                    <div class="add-issue-input">
                        <input type="text" placeholder="添加新问题..." id="new-issue-${tableId}-${itemId}" onkeypress="if(event.key==='Enter') issueManager.addIssueFromInput('${tableId}', '${itemId}')">
                        <button onclick="issueManager.addIssueFromInput('${tableId}', '${itemId}')">➕</button>
                    </div>
                `;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            addIssueFromInput(tableId, itemId) {
                const input = document.getElementById(`new-issue-${tableId}-${itemId}`);
                if (input && input.value.trim()) {
                    this.addIssue(tableId, itemId, input.value.trim());
                    input.value = '';
                }
            }
        }

        const issueManager = new CommonIssueManager();

        // 修复BUG：处理常见问题点击
        function handleIssueClick(element) {
            const issue = element.dataset.issue;
            const tableId = element.dataset.table;
            const itemId = element.dataset.item;
            
            addIssueToRemarkAndNoncompliant(tableId, itemId, issue);
        }

        // 修复BUG：处理删除按钮点击
        function handleRemoveIssue(event, tableId, itemId, issue) {
            event.stopPropagation();
            issueManager.removeIssue(tableId, itemId, issue);
        }

        // 点击常见问题后，自动关联为不符合
        function addIssueToRemarkAndNoncompliant(tableId, itemId, issue) {
            const item = document.querySelector(`[data-table="${tableId}"][data-item="${itemId}"]`);
            const remark = item.querySelector('.remark-input');
            const noncompliantRadio = item.querySelector('input[value="noncompliant"]');
            
            // 添加问题到备注
            if (remark) {
                if (!remark.value.includes(issue)) {
                    remark.value = remark.value ? remark.value + '\n' + issue : issue;
                }
            }
            
            // 自动选择"不符合"选项
            if (noncompliantRadio) {
                noncompliantRadio.checked = true;
                updateItemStatus(tableId, itemId, 'noncompliant');
                updateSummary();
            }
            
            // 视觉反馈
            item.scrollIntoView({ behavior: 'smooth', block: 'center' });
            item.style.animation = 'pulse 0.5s ease-in-out';
            setTimeout(() => {
                item.style.animation = '';
            }, 500);
        }

        // 获取表格标题
        function getTableTitle(tableId) {
            const titles = {
                table1: '表一：建设单位项目负责人（12项）',
                table2: '表二：施工单位项目经理（17项）',
                table3: '表三：专职安全员（15项）',
                table4: '表四：总监理工程师（14项）',
                table5: '表五：安全专业监理工程师（14项）'
            };
            return titles[tableId] || '';
        }

        // 渲染检查项 - 添加下一项按钮
        function renderInspectionItems(tableId) {
            const container = document.getElementById(`${tableId}-container`);
            const data = inspectionData[tableId];
            if (!data || !container) return;

            const tableIndex = tableOrder.indexOf(tableId);
            const hasPrev = tableIndex > 0;
            const hasNext = tableIndex < tableOrder.length - 1;

            container.innerHTML = `
                <div class="table-header">
                    <h2>${getTableTitle(tableId)}</h2>
                    <div class="progress-bar">
                        <div class="progress-track">
                            <div class="progress-fill" id="${tableId}-progress" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="${tableId}-progress-text">0/${data.length}</div>
                    </div>
                </div>
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterItems('${tableId}', 'all', this)">全部</button>
                    <button class="filter-btn" onclick="filterItems('${tableId}', 'pending', this)">待检查</button>
                    <button class="filter-btn" onclick="filterItems('${tableId}', 'compliant', this)">符合</button>
                    <button class="filter-btn" onclick="filterItems('${tableId}', 'noncompliant', this)">不符合</button>
                    <button class="filter-btn" onclick="filterItems('${tableId}', 'notapplicable', this)">无此项</button>
                </div>
                ${data.map((item, index) => `
                    <div class="inspection-item" data-table="${tableId}" data-item="${item.id}" data-status="pending" id="item-${tableId}-${index}">
                        <div class="item-header">
                            <span class="item-id">${item.id}</span>
                            <span class="item-title" contenteditable="false" id="title-${tableId}-${item.id}">${item.title}</span>
                            <button class="edit-btn" onclick="toggleEdit('${tableId}', '${item.id}')">✏️ 编辑</button>
                        </div>
                        <div class="item-details">
                            <div class="detail-section">
                                <h4>📋 检查方式</h4>
                                <ul id="methods-${tableId}-${item.id}">${item.methods.map(m => `<li>${m}</li>`).join('')}</ul>
                            </div>
                            <div class="detail-section">
                                <h4>💡 专家技巧</h4>
                                <ul id="tips-${tableId}-${item.id}">${item.tips.map(t => `<li>${t}</li>`).join('')}</ul>
                            </div>
                            <div class="detail-section">
                                <h4>⚠️ 常见问题</h4>
                                <div class="common-issues-container" id="issues-${tableId}-${item.id}"></div>
                            </div>
                            <div class="detail-section">
                                <h4>📖 法规依据</h4>
                                <p id="regulations-${tableId}-${item.id}">${item.regulations}</p>
                            </div>
                        </div>
                        <div class="item-result">
                            <label><input type="radio" name="result-${tableId}-${item.id}" value="compliant" onchange="updateItemStatus('${tableId}', '${item.id}', 'compliant'); updateSummary()"> ✅ 符合</label>
                            <label><input type="radio" name="result-${tableId}-${item.id}" value="noncompliant" onchange="updateItemStatus('${tableId}', '${item.id}', 'noncompliant'); updateSummary()"> ❌ 不符合</label>
                            <label><input type="radio" name="result-${tableId}-${item.id}" value="notapplicable" onchange="updateItemStatus('${tableId}', '${item.id}', 'notapplicable'); updateSummary()"> ⚪ 无此项</label>
                        </div>
                        <div class="item-remark">
                            <textarea class="remark-input" placeholder="备注说明（点击常见问题自动填入并标记为不符合）..." data-table="${tableId}" data-item="${item.id}" oninput="updateSummary()"></textarea>
                        </div>
                        <button class="next-item-btn" onclick="goToNextItem('${tableId}', ${index})">⬇️ 下一检查项</button>
                    </div>
                `).join('')}
                <div class="action-bar">
                    <button class="action-btn primary" onclick="selectAll('${tableId}', 'compliant')">✅ 全选符合</button>
                    <button class="action-btn warning" onclick="clearTable('${tableId}')">🔄 清空</button>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn prev" onclick="navigateTable(-1)" ${!hasPrev ? 'disabled' : ''}>⬅️ 上一张表</button>
                    <button class="nav-btn next" onclick="navigateTable(1)" ${!hasNext ? 'disabled' : ''}>➡️ 下一张表</button>
                </div>
            `;

            // 初始化常见问题
            data.forEach(item => {
                issueManager.renderIssueInput(tableId, item.id);
            });

            updateTableProgress(tableId);
        }

        // 新增：跳转到下一检查项
        function goToNextItem(tableId, currentIndex) {
            const data = inspectionData[tableId];
            if (currentIndex < data.length - 1) {
                const nextIndex = currentIndex + 1;
                const nextItem = document.getElementById(`item-${tableId}-${nextIndex}`);
                if (nextItem) {
                    nextItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    nextItem.style.animation = 'pulse 0.5s ease-in-out';
                    setTimeout(() => {
                        nextItem.style.animation = '';
                    }, 500);
                }
            } else {
                // 如果是最后一项，询问是否进入下一张表
                const tableIndex = tableOrder.indexOf(tableId);
                if (tableIndex < tableOrder.length - 1) {
                    if (confirm('当前表格已检查完毕，是否进入下一张表？')) {
                        navigateTable(1);
                    }
                } else {
                    alert('所有检查项已完成！');
                }
            }
        }

        // 切换编辑模式
        function toggleEdit(tableId, itemId) {
            const btn = event.target;
            const titleEl = document.getElementById(`title-${tableId}-${itemId}`);
            const methodsEl = document.getElementById(`methods-${tableId}-${itemId}`);
            const tipsEl = document.getElementById(`tips-${tableId}-${itemId}`);
            const regulationsEl = document.getElementById(`regulations-${tableId}-${itemId}`);
            
            const isEditing = btn.classList.contains('active');
            
            if (isEditing) {
                const item = inspectionData[tableId].find(i => i.id === itemId);
                if (item) {
                    item.title = titleEl.textContent.trim();
                    item.methods = Array.from(methodsEl.querySelectorAll('li')).map(li => li.textContent.trim());
                    item.tips = Array.from(tipsEl.querySelectorAll('li')).map(li => li.textContent.trim());
                    item.regulations = regulationsEl.textContent.trim();
                    localStorage.setItem('inspectionData', JSON.stringify(inspectionData));
                }
                
                titleEl.contentEditable = 'false';
                methodsEl.contentEditable = 'false';
                tipsEl.contentEditable = 'false';
                regulationsEl.contentEditable = 'false';
                btn.classList.remove('active');
                btn.textContent = '✏️ 编辑';
            } else {
                titleEl.contentEditable = 'true';
                methodsEl.contentEditable = 'true';
                tipsEl.contentEditable = 'true';
                regulationsEl.contentEditable = 'true';
                btn.classList.add('active');
                btn.textContent = '💾 保存';
            }
        }

        // 更新项目状态
        function updateItemStatus(tableId, itemId, status) {
            const item = document.querySelector(`[data-table="${tableId}"][data-item="${itemId}"]`);
            if (item) {
                item.dataset.status = status;
            }
            updateTableProgress(tableId);
            updateTabCount(tableId);
        }

        // 更新表格进度
        function updateTableProgress(tableId) {
            const container = document.getElementById(`${tableId}-container`);
            if (!container) return;
            const items = container.querySelectorAll('.inspection-item');
            const completed = Array.from(items).filter(i => i.dataset.status !== 'pending').length;
            const progress = (completed / items.length) * 100;
            
            document.getElementById(`${tableId}-progress`).style.width = `${progress}%`;
            document.getElementById(`${tableId}-progress-text`).textContent = `${completed}/${items.length}`;
        }

        // 更新标签计数
        function updateTabCount(tableId) {
            const container = document.getElementById(`${tableId}-container`);
            if (!container) return;
            const items = container.querySelectorAll('.inspection-item');
            const completed = Array.from(items).filter(i => i.dataset.status !== 'pending').length;
            const total = items.length;
            const tabId = tableId.replace('table', 'tab');
            const countEl = document.getElementById(`${tabId}-count`);
            if (countEl) {
                countEl.textContent = `${completed}/${total}`;
            }
        }

        // 筛选项目
        function filterItems(tableId, filter, btn) {
            const container = document.getElementById(`${tableId}-container`);
            if (!container) return;
            
            container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            
            container.querySelectorAll('.inspection-item').forEach(item => {
                const status = item.dataset.status;
                if (filter === 'all' || status === filter) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // 全选符合
        function selectAll(tableId, status) {
            const container = document.getElementById(`${tableId}-container`);
            if (!container) return;
            
            container.querySelectorAll('.inspection-item').forEach(item => {
                const radio = item.querySelector(`input[value="${status}"]`);
                if (radio) {
                    radio.checked = true;
                    updateItemStatus(tableId, item.dataset.item, status);
                }
            });
            updateSummary();
        }

        // 清空表格
        function clearTable(tableId) {
            if (!confirm('确定要清空该表格的所有选择吗？')) return;
            
            const container = document.getElementById(`${tableId}-container`);
            if (!container) return;
            
            container.querySelectorAll('.inspection-item').forEach(item => {
                item.dataset.status = 'pending';
                item.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
                item.querySelector('.remark-input').value = '';
            });
            
            updateTableProgress(tableId);
            updateTabCount(tableId);
            updateSummary();
        }

        // 表格导航
        function navigateTable(direction) {
            const newIndex = currentTableIndex + direction;
            if (newIndex >= 0 && newIndex < tableOrder.length) {
                const currentTable = tableOrder[currentTableIndex];
                const container = document.getElementById(`${currentTable}-container`);
                const items = container.querySelectorAll('.inspection-item');
                const completed = Array.from(items).filter(i => i.dataset.status !== 'pending').length;
                const total = items.length;
                
                if (direction > 0 && completed < total) {
                    if (!confirm(`当前表格还有 ${total - completed} 项未完成，确定要进入下一张表吗？`)) {
                        return;
                    }
                }
                
                currentTableIndex = newIndex;
                const newTable = tableOrder[currentTableIndex];
                
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.table === newTable) {
                        tab.classList.add('active');
                    }
                });
                
                document.querySelectorAll('.table-container, .summary-panel').forEach(el => el.classList.add('hidden'));
                document.getElementById(`${newTable}-container`).classList.remove('hidden');
                
                scrollToTop();
            }
        }

        // 快速滚动到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 快速滚动到底部
        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // 按责任人员分组显示不符合项
        function updateSummary() {
            let totalItems = 0;
            let completedItems = 0;
            let compliantItems = 0;
            let nonCompliantItems = 0;
            let notApplicableItems = 0;
            
            const nonCompliantByResponsibility = {
                table1: [],
                table2: [],
                table3: [],
                table4: [],
                table5: []
            };

            document.querySelectorAll('.inspection-item').forEach(item => {
                totalItems++;
                
                const result = item.querySelector('input[name^="result"]:checked');
                if (result) {
                    completedItems++;
                    
                    if (result.value === 'compliant') {
                        compliantItems++;
                    } else if (result.value === 'noncompliant') {
                        nonCompliantItems++;
                        const itemTitle = item.querySelector('.item-title')?.textContent || '';
                        const itemId = item.dataset.item || '';
                        const remark = item.querySelector('.remark-input')?.value || '';
                        const tableId = item.dataset.table;
                        
                        nonCompliantByResponsibility[tableId].push({
                            id: itemId,
                            title: itemTitle,
                            remark: remark,
                            table: tableId
                        });
                    } else if (result.value === 'notapplicable') {
                        notApplicableItems++;
                    }
                }
            });

            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('completed-items').textContent = completedItems;
            document.getElementById('compliant-items').textContent = compliantItems;
            document.getElementById('noncompliant-items').textContent = nonCompliantItems;
            document.getElementById('notapplicable-items').textContent = notApplicableItems;
            document.getElementById('completion-rate').textContent = 
                totalItems > 0 ? Math.round((completedItems / totalItems) * 100) + '%' : '0%';

            const responsibilityGroupsContainer = document.getElementById('responsibility-groups');
            let hasAnyIssues = false;
            
            responsibilityGroupsContainer.innerHTML = '<h3 style="margin-bottom: 20px; color: #c53030;">📋 各责任人员不符合项清单</h3>';
            
            tableOrder.forEach(tableId => {
                const issues = nonCompliantByResponsibility[tableId];
                if (issues.length > 0) {
                    hasAnyIssues = true;
                    const groupName = responsibilityNames[tableId];
                    
                    responsibilityGroupsContainer.innerHTML += `
                        <div class="responsibility-group">
                            <h4>
                                🏢 ${groupName} 
                                <span class="issue-count">${issues.length}项</span>
                            </h4>
                            ${issues.map(item => `
                                <div class="noncompliant-item">
                                    <strong>${item.id}</strong>
                                    <div class="item-detail">${item.title}</div>
                                    ${item.remark ? `<div class="item-remark">📝 备注：${item.remark}</div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            });
            
            if (!hasAnyIssues) {
                responsibilityGroupsContainer.innerHTML += '<p class="no-issues">✅ 所有责任人员均无不符合项</p>';
            }
        }

        // 标签页切换
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                const tableId = this.dataset.table;
                document.querySelectorAll('.table-container, .summary-panel').forEach(el => el.classList.add('hidden'));
                
                if (tableId === 'summary') {
                    document.getElementById('summary-container').classList.remove('hidden');
                    updateSummary();
                } else {
                    currentTableIndex = tableOrder.indexOf(tableId);
                    document.getElementById(`${tableId}-container`).classList.remove('hidden');
                }
                
                scrollToTop();
            });
        });

        // 添加项目模态框
        function showAddItemModal() {
            document.getElementById('addItemModal').classList.remove('hidden');
        }

        function closeAddItemModal() {
            document.getElementById('addItemModal').classList.add('hidden');
        }

        function confirmAddItem() {
            const tableId = document.getElementById('newItemTable').value;
            const itemId = document.getElementById('newItemId').value;
            const title = document.getElementById('newItemTitle').value;
            const methods = document.getElementById('newItemMethods').value.split('\n').filter(l => l.trim());
            const tips = document.getElementById('newItemTips').value.split('\n').filter(l => l.trim());
            const issues = document.getElementById('newItemIssues').value.split(',').map(i => i.trim()).filter(i => i);
            const regulations = document.getElementById('newItemRegulations').value;

            if (!itemId || !title) {
                alert('请填写检查项编号和标题');
                return;
            }

            const newItem = { id: itemId, title, methods, tips, commonIssues: issues, regulations };
            inspectionData[tableId].push(newItem);
            
            localStorage.setItem('inspectionData', JSON.stringify(inspectionData));
            
            renderInspectionItems(tableId);
            closeAddItemModal();
            alert('检查项添加成功！');
        }

        // 批量编辑模态框
        function showEditAllModal() {
            document.getElementById('editAllModal').classList.remove('hidden');
            loadEditItems();
        }

        function closeEditAllModal() {
            document.getElementById('editAllModal').classList.add('hidden');
        }

        function loadEditItems() {
            const tableId = document.getElementById('editTableSelect').value;
            const select = document.getElementById('editItemSelect');
            const data = inspectionData[tableId];
            
            select.innerHTML = data.map(item => `<option value="${item.id}">${item.id} - ${item.title.substring(0, 50)}...</option>`).join('');
            loadEditItemData();
        }

        function loadEditItemData() {
            const tableId = document.getElementById('editTableSelect').value;
            const itemId = document.getElementById('editItemSelect').value;
            const item = inspectionData[tableId].find(i => i.id === itemId);
            
            if (item) {
                document.getElementById('editItemTitle').value = item.title;
                document.getElementById('editItemMethods').value = item.methods.join('\n');
                document.getElementById('editItemTips').value = item.tips.join('\n');
                document.getElementById('editItemIssues').value = item.commonIssues.join(', ');
                document.getElementById('editItemRegulations').value = item.regulations;
            }
        }

        function confirmEditItem() {
            const tableId = document.getElementById('editTableSelect').value;
            const itemId = document.getElementById('editItemSelect').value;
            const item = inspectionData[tableId].find(i => i.id === itemId);
            
            if (item) {
                item.title = document.getElementById('editItemTitle').value;
                item.methods = document.getElementById('editItemMethods').value.split('\n').filter(l => l.trim());
                item.tips = document.getElementById('editItemTips').value.split('\n').filter(l => l.trim());
                item.commonIssues = document.getElementById('editItemIssues').value.split(',').map(i => i.trim()).filter(i => i);
                item.regulations = document.getElementById('editItemRegulations').value;
                
                localStorage.setItem('inspectionData', JSON.stringify(inspectionData));
                
                renderInspectionItems(tableId);
                closeEditAllModal();
                alert('修改已保存！');
            }
        }

        function downloadNotice() {

                <!DOCTYPE html>
                <html lang="zh-CN">

                    <meta charset="UTF-8">

                    <style>
                        body { font-family: 'SimSun', 'Microsoft YaHei', serif; padding: 40px; line-height: 2; }
                        .notice-preview { border: 2px solid #333; padding: 40px; }
                        .notice-title { font-size: 22px; font-weight: bold; text-align: center; margin-bottom: 30px; color: #c53030; }

            `;
            
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `整改通知书_${checkDate}.html`;
            a.click();
        }

        // 导出功能
        function exportJSON() {
            const data = {
                checkInfo: {
                    unit: document.getElementById('checkUnit').value,
                    checker: document.getElementById('checkerName').value,
                    date: document.getElementById('checkDate').value,
                    project: document.getElementById('projectName').value,
                    checkedUnit: document.getElementById('checkedUnit').value,
                    type: document.getElementById('checkType').value
                },
                results: []
            };

            document.querySelectorAll('.inspection-item').forEach(item => {
                const result = item.querySelector('input[name^="result"]:checked');
                if (result) {
                    data.results.push({
                        table: item.dataset.table,
                        itemId: item.dataset.item,
                        title: item.querySelector('.item-title').textContent,
                        result: result.value,
                        remark: item.querySelector('.remark-input').value
                    });
                }
            });

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `检查报告_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function printReport() {
            window.print();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const savedData = localStorage.getItem('inspectionData');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    Object.keys(parsed).forEach(key => {
                        if (inspectionData[key]) {
                            inspectionData[key] = parsed[key];
                        }
                    });
                } catch (e) {
                    console.error('加载保存数据失败', e);
                }
            }
            
            document.getElementById('checkDate').valueAsDate = new Date();
            
            tableOrder.forEach(renderInspectionItems);
            
            document.getElementById('table1-container').classList.remove('hidden');
        });
    </script>
</body>
