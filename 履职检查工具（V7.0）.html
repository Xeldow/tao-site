<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>建设工程安全责任人员履职检查系统（完整版·导入导出）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); line-height: 1.6; min-height: 100vh; padding-bottom: 80px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 15px; }
        .header { background: white; padding: 20px 25px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; }
        .header h1 { font-size: 22px; margin-bottom: 8px; color: #667eea; }
        .header p { color: #666; font-size: 13px; }
        .info-bar { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .info-item label { display: block; font-size: 13px; color: #666; font-weight: 600; margin-bottom: 5px; }
        .info-item input, .info-item select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .nav-tab { padding: 12px 20px; background: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: all 0.3s; }
        .nav-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; transform: translateY(-2px); }
        .table-container { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .table-header h2 { font-size: 20px; color: #333; }
        .progress-bar { flex: 1; min-width: 200px; max-width: 350px; }
        .progress-track { background: #e0e0e0; border-radius: 12px; height: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0; transition: width 0.5s; }
        .progress-text { font-size: 13px; color: #666; margin-top: 5px; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: 2px solid #e0e0e0; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .inspection-item { border: 2px solid #e8e8e8; border-radius: 12px; padding: 20px; margin-bottom: 20px; background: #fafbfc; transition: all 0.3s; }
        .inspection-item:hover { box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .inspection-item[data-status="compliant"] { border-left: 5px solid #4caf50; }
        .inspection-item[data-status="noncompliant"] { border-left: 5px solid #f44336; background: #fff5f5; }
        .inspection-item[data-status="notapplicable"] { border-left: 5px solid #9e9e9e; }
        .item-header { display: flex; gap: 12px; margin-bottom: 20px; align-items: flex-start; flex-wrap: wrap; }
        .item-id { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        .item-title { font-size: 16px; font-weight: 700; color: #333; flex: 1; line-height: 1.5; }
        .edit-btn { background: #667eea; color: white; border: none; padding: 5px 12px; border-radius: 16px; cursor: pointer; font-size: 11px; margin-left: 8px; transition: all 0.2s; }
        .edit-btn.active { background: #4caf50; }
        .next-item-btn { background: #11998e; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-top: 15px; width: 100%; text-align: center; font-weight: 600; transition: all 0.2s; }
        .next-item-btn:hover { transform: translateY(-2px); }
        .item-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .detail-section { background: white; padding: 15px; border-radius: 10px; border-left: 4px solid #667eea; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        .detail-section h4 { font-size: 15px; color: #667eea; margin-bottom: 12px; font-weight: 700; }
        .detail-section ul { padding-left: 20px; font-size: 14px; color: #444; }
        .detail-section li { margin-bottom: 8px; }
        .common-issues-container { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .issue-tag { background: #fff3cd; color: #856404; padding: 6px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; border: 2px solid #ffc107; transition: all 0.2s; }
        .issue-tag:hover { transform: scale(1.02); background: #ffc107; color: white; }
        .add-issue-input { display: flex; gap: 6px; margin-top: 10px; width: 100%; }
        .add-issue-input input { flex: 1; padding: 8px; border: 2px solid #ddd; border-radius: 16px; }
        .add-issue-input button { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 16px; cursor: pointer; }
        .item-result { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; background: white; padding: 15px; border-radius: 10px; }
        .item-result label { display: flex; align-items: center; gap: 8px; padding: 8px 18px; border: 2px solid #e0e0e0; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .item-result label:hover { border-color: #667eea; }
        .item-result label:has(input:checked) { background: #667eea; color: white; border-color: #667eea; }
        .item-remark textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; min-height: 80px; font-family: inherit; resize: vertical; }
        .summary-panel { background: white; border-radius: 15px; padding: 30px; margin-bottom: 15px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .summary-card { text-align: center; padding: 20px; background: #f5f7fa; border-radius: 12px; transition: all 0.2s; }
        .summary-card:hover { transform: translateY(-3px); }
        .summary-card.highlight { background: #667eea; color: white; }
        .summary-card.danger { background: #f5576c; color: white; }
        .summary-card.success { background: #11998e; color: white; }
        .summary-value { font-size: 32px; font-weight: 800; }
        .summary-label { font-size: 13px; font-weight: 600; }
        .responsibility-group { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #f44336; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .responsibility-group h4 { color: #c53030; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
        .responsibility-group .issue-count { background: #f44336; color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        .noncompliant-item { background: #fafbfc; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #f56565; }
        .no-issues { color: #38a169; text-align: center; padding: 30px; font-size: 16px; font-weight: 600; }
        .action-bar { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .action-btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: all 0.2s; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .action-btn.primary { background: #667eea; color: white; }
        .action-btn.success { background: #11998e; color: white; }
        .action-btn.danger { background: #f44336; color: white; }
        .action-btn.warning { background: #ff9800; color: white; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; }
        .nav-btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: all 0.2s; }
        .nav-btn.prev { background: #e0e0e0; }
        .nav-btn.next { background: #667eea; color: white; }
        .nav-btn:hover { transform: translateY(-2px); }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .quick-nav { position: fixed; right: 20px; bottom: 80px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .quick-btn { width: 50px; height: 50px; border-radius: 50%; background: #667eea; color: white; border: none; font-size: 20px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.2); transition: all 0.2s; }
        .quick-btn:hover { transform: scale(1.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px 15px; display: flex; justify-content: space-around; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); z-index: 999; }
        .bottom-nav-btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .bottom-nav-btn.primary { background: #667eea; color: white; }
        .bottom-nav-btn.danger { background: #f44336; color: white; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; border-radius: 15px; padding: 30px; max-width: 800px; width: 95%; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-family: inherit; }
        .hidden { display: none !important; }
        @media (max-width: 768px) { .container { padding: 10px; } .info-grid { grid-template-columns: 1fr; } .item-details { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: repeat(2, 1fr); } .action-btn { padding: 10px 16px; font-size: 12px; } .nav-tab { padding: 8px 12px; font-size: 12px; } }
        @media print { .nav-tabs, .filter-bar, .action-bar, .add-issue-input, .quick-nav, .nav-buttons, .edit-btn, .bottom-nav, .next-item-btn { display: none !important; } .inspection-item { break-inside: avoid; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏗️ 建设工程安全责任人员履职检查系统</h1>
        <p>完整版 · 全字段可编辑 · 导入/导出 · 数据同步</p>
    </div>
    <div class="info-bar">
        <div class="info-grid">
            <div class="info-item"><label>🏢 检查单位</label><input type="text" id="checkUnit" placeholder="请输入检查单位"></div>
            <div class="info-item"><label>👤 检查人员</label><input type="text" id="checkerName" placeholder="请输入检查人员"></div>
            <div class="info-item"><label>📅 检查日期</label><input type="date" id="checkDate"></div>
            <div class="info-item"><label>🏗️ 项目名称</label><input type="text" id="projectName" placeholder="请输入项目名称"></div>
            <div class="info-item"><label>🏭 受检单位</label><input type="text" id="checkedUnit" placeholder="请输入受检单位"></div>
            <div class="info-item"><label>📋 检查类型</label><select id="checkType"><option>日常检查</option><option>专项检查</option><option>季度考核</option><option>年度考核</option></select></div>
        </div>
    </div>
    <div class="nav-tabs">
        <button class="nav-tab active" data-table="table1">🏢 建设单位 (10项)</button>
        <button class="nav-tab" data-table="table2">👷 项目经理 (13项)</button>
        <button class="nav-tab" data-table="table3">🛡️ 安全员 (9项)</button>
        <button class="nav-tab" data-table="table4">📋 总监 (12项)</button>
        <button class="nav-tab" data-table="table5">🔍 专监 (10项)</button>
        <button class="nav-tab" data-table="summary">📊 汇总</button>
    </div>
    <div id="table1-container" class="table-container"></div>
    <div id="table2-container" class="table-container hidden"></div>
    <div id="table3-container" class="table-container hidden"></div>
    <div id="table4-container" class="table-container hidden"></div>
    <div id="table5-container" class="table-container hidden"></div>
    <div id="summary-container" class="summary-panel hidden">
        <h2>📊 检查汇总报告</h2>
        <div class="summary-grid">
            <div class="summary-card"><div class="summary-value" id="total-items">0</div><div class="summary-label">检查项总数</div></div>
            <div class="summary-card highlight"><div class="summary-value" id="completed-items">0</div><div class="summary-label">已完成</div></div>
            <div class="summary-card success"><div class="summary-value" id="compliant-items">0</div><div class="summary-label">符合</div></div>
            <div class="summary-card danger"><div class="summary-value" id="noncompliant-items">0</div><div class="summary-label">不符合</div></div>
            <div class="summary-card"><div class="summary-value" id="notapplicable-items">0</div><div class="summary-label">无此项</div></div>
            <div class="summary-card highlight"><div class="summary-value" id="completion-rate">0%</div><div class="summary-label">完成率</div></div>
        </div>
        <div id="responsibility-groups"></div>
        <div class="action-bar">
            <button class="action-btn primary" onclick="printReport()">🖨️ 打印报告</button>
            <button class="action-btn success" onclick="exportJSON()">📥 导出JSON</button>
            <button class="action-btn warning" onclick="importJSON()">📂 导入JSON</button>
            <button class="action-btn danger" onclick="exportNotice()">📄 整改通知书</button>
            <button class="action-btn warning" onclick="resetAllData()">🔄 重置默认数据</button>
        </div>
    </div>
    <div class="action-bar">
        <button class="action-btn primary" onclick="printReport()">🖨️ 打印报告</button>
        <button class="action-btn success" onclick="exportJSON()">📥 导出JSON</button>
        <button class="action-btn warning" onclick="importJSON()">📂 导入JSON</button>
        <button class="action-btn primary" onclick="showAddItemModal()">➕ 添加检查项</button>
        <button class="action-btn primary" onclick="showEditAllModal()">✏️ 批量编辑</button>
        <button class="action-btn danger" onclick="exportNotice()">📄 整改书</button>
    </div>
</div>
<div class="quick-nav">
    <button class="quick-btn top" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆️</button>
    <button class="quick-btn bottom" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">⬇️</button>
</div>
<div class="bottom-nav">
    <button class="bottom-nav-btn primary" onclick="navigateTable(-1)">⬅️ 上一表</button>
    <button class="bottom-nav-btn primary" onclick="navigateTable(1)">下一表 ➡️</button>
    <button class="bottom-nav-btn danger" onclick="exportNotice()">📄 整改书</button>
</div>

<!-- 模态框 -->
<div id="addItemModal" class="modal hidden"><div class="modal-content"><div class="modal-header"><h3>➕ 添加新检查项</h3><button class="close-btn" onclick="closeAddItemModal()" style="background:none;border:none;font-size:24px;cursor:pointer;">×</button></div>
    <div class="form-group"><label>表格</label><select id="newItemTable"><option value="table1">建设单位</option><option value="table2">项目经理</option><option value="table3">安全员</option><option value="table4">总监</option><option value="table5">专监</option></select></div>
    <div class="form-group"><label>编号</label><input type="text" id="newItemId" placeholder="例：6.1"></div>
    <div class="form-group"><label>标题</label><input type="text" id="newItemTitle" placeholder="标题"></div>
    <div class="form-group"><label>检查内容</label><textarea id="newItemContent" rows="2"></textarea></div>
    <div class="form-group"><label>检查方式（每行一条）</label><textarea id="newItemMethods" rows="3"></textarea></div>
    <div class="form-group"><label>检查要点（每行一条）</label><textarea id="newItemTips" rows="3"></textarea></div>
    <div class="form-group"><label>常见问题（逗号分隔）</label><input type="text" id="newItemIssues"></div>
    <div class="form-group"><label>法规依据</label><textarea id="newItemRegulations" rows="2"></textarea></div>
    <button class="action-btn primary" onclick="confirmAddItem()">确认添加</button>
    <button class="action-btn" onclick="closeAddItemModal()" style="margin-top:10px;">取消</button>
</div></div>

<div id="editAllModal" class="modal hidden"><div class="modal-content"><div class="modal-header"><h3>✏️ 批量编辑检查项</h3><button class="close-btn" onclick="closeEditAllModal()" style="background:none;border:none;font-size:24px;cursor:pointer;">×</button></div>
    <div class="form-group"><label>表格</label><select id="editTableSelect" onchange="loadEditItems()"><option value="table1">建设单位</option><option value="table2">项目经理</option><option value="table3">安全员</option><option value="table4">总监</option><option value="table5">专监</option></select></div>
    <div class="form-group"><label>检查项</label><select id="editItemSelect" onchange="loadEditItemData()"></select></div>
    <div class="form-group"><label>标题</label><input type="text" id="editItemTitle"></div>
    <div class="form-group"><label>检查内容</label><textarea id="editItemContent" rows="2"></textarea></div>
    <div class="form-group"><label>检查方式</label><textarea id="editItemMethods" rows="3"></textarea></div>
    <div class="form-group"><label>检查要点</label><textarea id="editItemTips" rows="3"></textarea></div>
    <div class="form-group"><label>常见问题</label><input type="text" id="editItemIssues"></div>
    <div class="form-group"><label>法规依据</label><textarea id="editItemRegulations" rows="2"></textarea></div>
    <button class="action-btn primary" onclick="confirmEditItem()">保存修改</button>
    <button class="action-btn" onclick="closeEditAllModal()" style="margin-top:10px;">取消</button>
</div></div>

<div id="noticeModal" class="modal hidden"><div class="modal-content" style="max-width: 900px;"><div class="modal-header"><h3>📄 整改通知书预览</h3><button class="close-btn" onclick="closeNoticeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;">×</button></div>
    <div id="noticePreview"></div>
    <div class="action-bar" style="margin-top:20px;"><button class="action-btn primary" onclick="printNotice()">🖨️ 打印</button><button class="action-btn success" onclick="downloadNotice()">💾 下载</button></div>
</div></div>

<input type="file" id="importFileInput" accept=".json" style="display: none;" onchange="handleImportFile(this)">

<script>
// ======================= 完整默认数据（54项全字段） =======================
const defaultData = {
    table1: [
        {id:"1.1",title:"安全责任制与双重预防机制",content:"核实项目负责人是否建立健全安全生产责任制，是否落实安全风险分级管控和隐患排查治理双重预防工作机制。",methods:["1.查阅项目负责人签署的《安全生产责任承诺书》。","2.查阅项目安全生产分级管控清单及隐患排查治理台账。","3.访谈项目负责人对双重预防机制的掌握情况。","4.查阅建设单位检查参建单位主要管理人员安全工作履职情况记录。"],tips:["项目负责人必须在办理施工许可前签署《安全生产责任承诺书》。","重点检查是否参与建立了项目安全风险分级管控清单，是否制定了隐患排查治理制度。","主要负责人是否定期（每月/每季度/复工复产前）带队检查安全生产工作。","交叉验证：承诺书签署记录 ↔ 安全检查台账 ↔ 隐患整改闭环资料 ↔ 考核奖惩记录。"],commonIssues:["未签署安全生产责任承诺书。","仅有制度文件，无实际的风险辨识记录或隐患排查记录。","项目负责人未组织开展定期检查，对现场安全情况不知情。","对参建各方人员安全生产履职情况检查流于形式。"],regulations:"《广东省住房和城乡建设厅关于房屋市政工程建设单位落实质量安全首要责任的管理规定》第五条、第六条"},
        {id:"1.2",title:"发包与用工管理",content:"查阅发包合同，核实是否将工程发包给具备相应资质的单位，不得肢解发包或违规指定分包单位；核查建筑工人实名制落实情况。",methods:["1.查阅施工合同、分包合同原件。","2.通过全国建筑市场监管公共服务平台查询承包单位资质信息。","3.核对合同范围是否存在肢解发包情形。","4.查阅实名制管理平台数据及现场花名册。"],tips:["资质查询必须当场用手机/电脑查，不能只看打印件。","肢解发包识别：同一单位工程分多个合同、同一专业分多家施工。","挂靠与转包识别：查社保缴纳单位与资质单位是否一致。","检查实名制：现场工人100%录入平台，按月审核工资支付表。","交叉验证：合同 ↔ 资质 ↔ 社保 ↔ 实名制考勤 ↔ 工资流水。"],commonIssues:["资质挂靠","肢解发包规避招标","未落实实名制管理"],regulations:"《建设工程安全生产管理条例》第七条；《建筑法》第二十四条；《广东省...管理规定》第十四条、第十九条"},
        {id:"1.3",title:"施工图审查",content:"查阅审查文件，核实施工图设计文件是否报有关机构审查，未经审查批准不得使用。",methods:["1.查阅施工图审查合格书及审查意见书。","2.通过施工图审查信息系统核对审查状态。","3.核对设计变更是否重新报审。"],tips:["查阅审查机构资质、人员签字、日期。","在广东省工程设计文件管理系统核对真实性。","结构、消防、节能等变更必须重新审查。","交叉验证：合格书日期 ↔ 图纸日期 ↔ 施工日志 ↔ 变更文件。"],commonIssues:["未审先施","以优化设计名义降低标准","审查造假","重大变更未重审"],regulations:"《房屋建筑和市政基础设施工程施工图设计文件审查管理办法》；《广东省...管理规定》第十二条、第十三条"},
        {id:"1.4",title:"工期与造价",content:"查阅施工合同，核实是否存在盲目压缩合同约定工期、迫使承包单位以低于成本价格竞标的情况。",methods:["1.查阅施工合同工期条款，对比定额工期。","2.查阅招标文件、中标通知书、工程量清单计价文件。","3.访谈施工单位确认是否存在压价行为。"],tips:["定额工期查询：《广东省建设工程施工工期定额》。","压缩工期识别：合同工期＜定额工期80%需专项论证；现浇混凝土主体结构施工周期不宜少于7天/层。","检查优质优价政策落实。","交叉验证：合同工期 ↔ 定额工期 ↔ 施工进度计划 ↔ 混凝土施工日志。"],commonIssues:["阴阳合同","工期低于7天/层","压缩工期无专家论证","未落实工期补偿"],regulations:"《建设工程安全生产管理条例》第七条；《广东省...管理规定》第十五条"},
        {id:"1.5",title:"文明施工、安全费用列支与拨付",content:"查阅工程概算及支付凭证，核实是否将文明施工、扬尘防治与安全生产措施费用单独列支，并按合同约定及时足额拨付。",methods:["1.查阅工程概算书、安全费用专用账户。","2.核对银行转账凭证、发票。","3.查阅安全费用使用台账并与支付凭证比对。","4.检查现场文明施工、扬尘防治措施落实情况。"],tips:["合同工期一年以内预付≥50%，一年以上预付≥30%。","必须存入三方共管专用账户，严禁混拨。","按施工进度同步拨付，滞后超过30天需说明。","交叉验证：概算金额 ↔ 合同金额 ↔ 实际拨付 ↔ 现场设施。"],commonIssues:["安措费挪作他用","预付不足","支付滞后无说明"],regulations:"《建设工程安全生产管理条例》第八条；《广东省...管理规定》第二十条"},
        {id:"1.6",title:"安全施工措施",content:"查阅备案资料，核实领取施工许可证时是否报送安全施工措施，是否办理工程质量、安全监督手续。",methods:["1.核对办理时间与开工时间。","2.查阅质量安全监督交底书。","3.查阅危大工程及超过一定规模的危大工程清单。"],tips:["当地质量安全监督站查询项目登记信息。","检查是否已取得施工许可证或开工报告。","交叉验证：施工许可证日期 ↔ 监督登记日期 ↔ 开工报告日期 ↔ 实际动工日期。"],commonIssues:["未提供安全施工措施先开工","未及时报送","未取得施工许可证擅自施工"],regulations:"《建设工程安全生产管理条例》第十条；《广东省...管理规定》第十条"},
        {id:"1.7",title:"前期资料",content:"查阅移交记录，核实是否向勘察、设计、施工、监理等单位提供真实、准确、齐全的原始资料，是否组织勘察、设计等单位在施工招标文件中列出危大工程清单。",methods:["1.查阅资料移交清单及签收记录。","2.核对地质勘察报告、地下管线资料、相邻建筑物资料等是否完整。","3.访谈参建单位确认资料接收情况。"],tips:["重点检查地下管线、地质勘察、周边建筑物、气象水文等资料。","检查建设单位是否对毗邻建筑物、相关管线设施进行了专项调查。","检查资料移交清单是否有各方签字盖章。","交叉验证：移交清单 ↔ 签收记录 ↔ 访谈 ↔ 施工图纸引用资料。"],commonIssues:["未提供环境调查报告或不全","调查报告信息不全","招标文件中未列出危大工程清单"],regulations:"《建设工程安全生产管理条例》第六条；《广东省...管理规定》第十一条"},
        {id:"1.8",title:"设备、材料采购",content:"查阅采购清单，核实是否明示或暗示施工单位使用不合格或不符合设计要求的建筑材料、建筑构配件和设备，不得指定生产厂或供应商。",methods:["1.查阅甲供材料设备清单及采购合同。","2.核对设计文件与材料规格是否一致。","3.访谈施工单位确认是否存在指定供应商行为。"],tips:["指定供应商识别：查会议纪要、工作联系单、口头指令记录。","材料质量：查检测报告、合格证、进场验收记录。","检查建设单位自行采购材料是否符合设计和合同要求。","第三方检测机构不得与施工单位委托的为同一家。","交叉验证：设计文件 ↔ 采购合同 ↔ 进场验收 ↔ 检测报告。"],commonIssues:["指定供应商","甲供材料质量不合格","违规减少检测项目"],regulations:"《建设工程安全生产管理条例》第九条；《广东省...管理规定》第十九条"},
        {id:"1.9",title:"危大工程管理",content:"核实建设单位是否在招标文件中列出危大工程清单，是否保障危大工程施工技术措施费，是否督促落实六不施工及提级管控要求、是否按规定进行第三方监测。",methods:["1.查阅招标文件及投标文件，核对危大工程清单及安全管理措施。","2.查阅施工合同及财务支付凭证，核对危大工程专项措施费支付情况。","3.查阅建设单位月度/季度安全检查记录、参建各方履职情况考核及监理通知单。","4.查阅第三方监测合同、方案及记录。"],tips:["检查招标文件中是否已列出危大工程清单。","是否按合同约定及时支付危大工程施工技术措施费。","检查建设单位督促施工单位项目负责人和总监理工程师在岗履职情况。","检查施工单位落实重大危险源安全包保责任制的相关情况。","第三方监测结果异常是否立即组织处置。","交叉验证：招标文件 ↔ 合同费用 ↔ 专项方案 ↔ 现场施工 ↔ 监理通知。"],commonIssues:["招标文件未列出危大清单","未支付或挪用措施费","未检查项目经理/总监在岗","监测异常未处置"],regulations:"《危险性较大的分部分项工程安全管理规定》（住建部令第37号）；《广东省...管理规定》第二十条"},
        {id:"1.10",title:"现场隐患排查治理",content:"核实建设单位是否建立并落实月、季度及复工复产前的安全检查制度，是否对隐患整改进行闭环管理。",methods:["1.查阅建设单位下发的月度、季度安全检查记录。","2.查阅隐患整改通知单及施工单位的整改回复报告。","3.查阅复工复产前的安全检查记录。"],tips:["是否建立月质量安全检查、季度质量安全检查制度。","是否在复工复产前组织全面检查并对复工条件作出明确评价。","重大隐患是否建立排查治理档案并依法报告。","交叉验证：检查通报 ↔ 整改通知 ↔ 整改回复 ↔ 复工令"],commonIssues:["无月度/季度检查记录或流于形式","复工复产前未组织全面检查","发现隐患后无整改回复，未闭环"],regulations:"《广东省...管理规定》第十八条"}
    ],
    // 由于字数限制，table2~table5 的完整数据将在第二部分继续
};
// ======================= 续：项目经理（13项） =======================
defaultData.table2 = [
    {id:"2.1",title:"安全生产责任制",content:"核实项目经理是否建立以本人为第一责任人的项目安全生产领导小组；是否明确各岗位的责任人员、责任范围和考核标准；是否组织制定并实施项目全员安全生产责任制度。",methods:["1.查阅项目安全生产领导小组成立文件。","2.查阅全员安全生产责任清单及考核标准文件。","3.查阅责任制考核记录。"],tips:["检查是否建立了全员安全生产责任清单。","重点核查项目经理是否按规定对项目管理人员及分包单位的安全生产责任制落实情况进行考核。","交叉验证：人员名单 ↔ 责任清单 ↔ 考核记录 ↔ 现场访谈"],commonIssues:["未成立项目安全生产领导小组。","责任制仅停留在纸面，未进行实质性考核。","责任清单缺失，部分岗位责任不清。"],regulations:"《广东省住房和城乡建设厅关于落实建筑施工企业、工程项目安全生产管理机构设置及安全生产管理人员配备办法的通知》第二十条第（一）款"},
    {id:"2.2",title:"安全生产管理体系",content:"核实项目经理是否建立独立的安全生产管理机构；是否按规定配备专职安全生产管理人员；是否建立安全生产会议制度。",methods:["1.查阅项目经理建造师注册证书、安全生产考核合格证书（B证）原件。","2.查阅项目组织架构图及安全生产管理机构设置文件。","3.核对专职安全员配备数量及资格（C证）。","4.查阅安全生产会议纪要。"],tips:["检查是否设置了独立的安全生产管理机构，是否按规定配置安全总监。","人员配备标准：建筑工程1万平以下≥1人；1万～5万平≥2人；5万平以上≥3人；市政工程5000万以下≥1人；5000万～2亿≥2人；2亿以上≥3人。涉及起重机械增加1名机械类专职安全员。","安全生产会议纪要内容要有针对性。","交叉验证：组织架构 ↔ 任命书 ↔ 证书 ↔ 考勤 ↔ 社保。"],commonIssues:["未设置独立安管机构","专职安全员配备数量不足","安全员无证上岗或兼职","会议流于形式"],regulations:"《广东省...通知》第二十条第（二）款、第二十一条、第二十六条"},
    {id:"2.3",title:"安全生产制度及技术交底",content:"核实是否组织制定并实施项目安全生产规章制度（奖惩、危险作业审批等）和各工种安全操作规程；是否落实安全技术交底制度。",methods:["1.查阅安全生产规章制度汇编及操作规程手册。","2.查阅技术交底记录及现场执行情况。","3.现场抽查作业人员了解交底内容掌握情况。"],tips:["检查是否有动火、有限空间等危险作业审批制度及执行记录。","安全技术交底记录应包括方案编制人员或项目技术负责人对项目安全管理人员交底、项目安全管理人员对作业人员交底。","核查技术交底是否由技术人员向作业人员详细说明，让被交底人现场再签一次，对比笔迹签字，严禁代签。","交叉验证：制度文件 ↔ 审批单 ↔ 交底记录 ↔ 现场作业行为"],commonIssues:["制度缺失或照搬照抄无针对性","交底流于形式作业人员不知情","签字造假","现场作业违反操作规程"],regulations:"《广东省...通知》第二十条第（三）款"},
    {id:"2.4",title:"教育培训及持证核查",content:"核实是否制定年度教育培训计划；是否对新进场工人进行三级教育；特种作业人员是否持证上岗。",methods:["1.查阅培训计划及实施记录（签到表、影像资料）。","2.查阅三级教育卡及考核试卷。","3.查询特种作业人员证书真伪。"],tips:["三级教育：必须包含公司级、项目级、班组级，每级教育时间符合规定。","必须通过应急管理部官网或住建部平台核实特种作业人员证书真伪及有效期。","建立一人一档，档案内容齐全。","交叉验证：培训计划 ↔ 签到表 ↔ 影像资料 ↔ 考核试卷 ↔ 证书查询"],commonIssues:["教育培训缺失或造假","特种作业无证上岗或证件过期","人证不符"],regulations:"《广东省...通知》第二十条第（四）款"},
    {id:"2.5",title:"安全保障费用",content:"核实是否编制安全生产资金投入计划；安措费是否专户核算、专款专用；是否为作业人员办理意外伤害保险，是否购买安全生产责任险。",methods:["1.查阅安措费提取和使用计划。","2.核对财务台账、发票凭证。","3.查阅保险保单。"],tips:["重点核查费用是否用于购置安全防护用具、设施，是否存在挪用现象。","核实是否为施工现场从事危险作业的人员办理了意外伤害保险或工伤保险，项目是否投保安全生产责任险，保险有效期是否覆盖整个施工期。","现场安全设施投入与财务支出是否匹配。","交叉验证：资金计划 ↔ 财务台账 ↔ 发票凭证 ↔ 现场实物 ↔ 保险保单"],commonIssues:["未编制资金计划","安全费用挪作他用","未办理保险或保险过期"],regulations:"《广东省...通知》第二十条第（五）款"},
    {id:"2.6",title:"危险源辨识与风险分级管控",content:"核实项目经理是否组织开展了危险源辨识与评估工作；是否根据工程进展动态更新危险源清单；核实项目经理是否建立项目安全风险分级管控清单；是否对辨识出的风险进行分级，并落实相应的管控层级和管控措施；是否落实重大风险的提级管控。",methods:["1.查阅危险源辨识与风险分级管控清单。","2.查阅施工组织设计及专项施工方案中关于风险管控措施的描述。","3.现场核对高风险部位的管控措施落实情况。","4.查阅项目开工前及分部分项工程开工前的安全技术交底资料。"],tips:["检查危险源辨识工作是否由项目经理组织，项目技术负责人、专职安全员等是否参与了辨识过程。","核查是否在施工条件发生变化时重新组织了危险源辨识与评估。","检查是否建立了动态更新的危险源辨识与风险分级管控清单，包含风险点名称、风险描述、风险等级（红橙黄蓝）、管控措施、管控责任人等要素。","核查红色（重大）风险是否由项目经理直接负责管控。","交叉验证：风险清单 ↔ 专项方案 ↔ 施工日志 ↔ 现场实体"],commonIssues:["未建立风险分级管控清单或照搬照抄","危险源清单未及时更新","重大风险未提级管控","管控措施缺乏针对性"],regulations:"《广东省...通知》第二十条第（六）款"},
    {id:"2.7",title:"隐患排查治理",content:"核实是否建立隐患排查治理制度；是否建立隐患排查治理小组并明确责任；是否建立隐患排查治理台账；是否实行隐患闭环管理和逐项销号；是否落实住房城乡建设主管部门和工程建设相关单位提出的隐患整改要求。",methods:["1.查阅《隐患排查治理台账》及《重大事故隐患判定台账》。","2.查阅周检、月检、专项检查记录。","3.查阅建设、监理隐患整改通知单、整改回复单及复查记录。","4.查阅主管部门下发的整改通知书及项目回复的整改报告。"],tips:["检查隐患排查治理台账是否针对高风险点进行了重点排查。","核查是否建立了重大事故隐患台账，并实行逐项明确、逐项销号全流程管理。","检查隐患整改是否做到三定（定人、定时、定措施），复查记录是否由项目经理或其授权人签字确认。","交叉验证：台账 ↔ 通知单 ↔ 回复单 ↔ 复查记录 ↔ 现场实体"],commonIssues:["隐患排查治理流于形式台账造假","未建立重大事故隐患台账","重大隐患未提级管理和销号","隐患整改未闭环无复查记录"],regulations:"《广东省...通知》第二十条第（六）款"},
    {id:"2.8",title:"危大工程管理",content:"核实危大工程施工期间，项目经理是否在施工现场履职；是否组织对危大工程的专项巡查。",methods:["1.查阅危大工程施工期间的项目负责人带班生产资料。","2.查阅危大工程专项施工方案及施工日志。","3.查阅项目经理对危大工程的交底检查验收资料。"],tips:["检查带班期间是否填写了安全检查记录，是否发现了问题并提出整改要求。","危大工程施工过程中，带班生产记录中是否有加强对重点部位、关键环节的控制的相关内容，是否及时消除隐患。","比对带班记录时间与危大工程施工时间，排查代签或补签现象。","交叉验证：带班记录 ↔ 施工日志 ↔ 视频监控 ↔ 危大工程实施时间"],commonIssues:["危大工程施工期间项目经理脱岗","带班记录与实际施工进度不符造假","未进行书面委托擅自离开"],regulations:"《广东省...通知》第二十条第（六）款；《建筑施工企业负责人及项目负责人施工现场带班暂行办法》"},
    {id:"2.9",title:"安全生产条件",content:"是否保证安全防护设施、临时用电、消防设施、现场围挡等符合规范要求；是否将办公、生活区与作业区分开设置；是否为作业人员提供合格的劳动防护用品；是否落实带班生产制度，每月带班生产时间是否不少于本月施工时间的80%；短期离开现场时是否有书面委托。",methods:["1.查阅项目负责人带班生产资料，核对签字、时间与施工日志。","2.查阅项目经理外出时书面委托书及被委托人履职记录。","3.查阅安全生产检查记录及隐患整改通知单，核实整改闭环情况。","4.查询安全帽、安全带、安全网质量检验报告，必要时现场抽检对应材料。"],tips:["每月带班生产时间不得少于本月施工时间的80%，通过查阅带班记录、施工安全日志、现场进度了解情况、实名制系统等进行判定。","项目经理离开施工现场时，必须有书面委托书，且被委托人应为项目相关负责人（安全总监）。","交叉验证：带班记录 ↔ 考勤记录 ↔ 视频监控 ↔ 隐患排查记录 ↔ 整改回复"],commonIssues:["安全带、安全帽、安全网质量差或未经检测","带班记录造假","长期不在岗"],regulations:"《广东省...通知》第二十条第（七）款、第二十四条"},
    {id:"2.10",title:"应急救援预案",content:"核实是否组织制定项目生产安全事故应急救援预案；是否每半年至少组织1次演练；是否建立应急值班制度。",methods:["1.查阅应急预案。","2.查年度演练计划、演练记录、评估报告。","3.查阅应急物资清单及维护记录。"],tips:["是否每半年至少组织1次应急预案演练。","现场是否配备必要的应急救援器材、设备，并进行经常性维护保养。","演练是否符合项目实际，是否包含周边环境、救援力量等内容。","总结记录中是否对演练过程进行评价，是否提出改进措施。","交叉验证：预案文件 ↔ 演练计划 ↔ 演练记录 ↔ 物资台账 ↔ 现场实物"],commonIssues:["未制定预案或照搬照抄无针对性","未按规定频次演练","应急物资缺失或失效","演练流于形式"],regulations:"《广东省...通知》第二十条第（八）款、第三十二条"},
    {id:"2.11",title:"事故报告",content:"是否建立健全事故处理及报告制度；核实发生事故后是否立即启动预案；是否按规定向企业及主管部门报告；是否保护事故现场；是否配合调查。",methods:["1.查阅各项应急预案中是否包含事故处理及报告制度。","2.查阅事故报告记录及时间戳。","3.访谈相关人员。"],tips:["核实是否在1小时内向事故发生地县级以上人民政府建设主管部门报告。","查阅事故调查、处理、整改记录。","分别访谈多人，比对说法一致性。","交叉验证：事故记录 ↔ 电话通话记录 ↔ 上报文件 ↔ 现场状态"],commonIssues:["瞒报、谎报、迟报事故","破坏事故现场","阻碍事故调查","事故后未落实整改措施"],regulations:"《广东省...通知》第二十条第（九）款"},
    {id:"2.12",title:"现场文明施工",content:"核实工地是否沿四周连续设置封闭围挡及围挡材质是否达标；现场进出口封闭管理、大门门卫制度及车辆冲洗设施落实情况；施工场地主要道路硬化、裸露场地防尘措施及排水系统；材料存放的分类、规整及安全环保措施、建筑垃圾清运方式；办公区、生活区与作业区的分区隔离情况及宿舍的居住安全标准；现场防火制度、消防器材配置管理。",methods:["1.实地踏勘工地四周及内部，检查围挡连续性、道路硬化、材料堆放、裸土覆盖及三区分离情况。","2.查阅消防设施布置图、材料进场台账及门卫管理制度。","3.使用测量工具核实围挡高度、宿舍通道宽度及人均使用面积。","4.启动车辆冲洗设施及现场喷淋系统，检查其运作有效性。"],tips:["工地必须沿四周连续设置封闭围挡；进出口必须设置大门、门卫室，施工人员持工作卡进出现场。","主要道路必须进行硬化处理；对易产生扬尘的路面、裸露地面及存放土方，必须采取严密的防尘措施。","材料码放整齐，建筑物内施工垃圾清运严禁凌空抛掷；易燃易爆物品必须分类存放。","办公区、生活区与作业区必须明显划分并有隔离措施；严禁在施工程、伙房、库房兼做宿舍；宿舍内严禁使用通铺，人均使用面积不小于2.5m²，通道宽度不小于0.9m，居住人数不超过16人。","消防器材配备有效、足够、合理。","交叉验证：现场状态 ↔ 平面布置图 ↔ 检查记录"],commonIssues:["围挡未连续设置","扬尘失控（冲洗设施缺失、裸土未覆盖）","材料随意堆放占用消防通道","三区未有效隔离、宿舍违规住人","消防器材不足或失效"],regulations:"《建设工程安全生产管理条例》第二十八条、第二十九条、第三十条、第三十一条；《建设工程施工现场环境与卫生标准》JGJ146；《建筑施工安全检查标准》JGJ59"},
    {id:"2.13",title:"分包管理",content:"查阅分包协议，核实分包单位资质、是否与分包单位签订安全生产管理协议，分包单位安全员数量和履职情况是否符合要求，明确双方安全生产责任。",methods:["1.查阅分包单位施工资质。","2.查阅分包合同及安全生产管理协议。","3.查阅对分包单位的安全检查记录。"],tips:["对分包单位资质登陆四库一平台进行核实，确定资质是否满足工程要求。","是否组织分包作业人员参与安全培训。","查阅安全日志岗前培训内容是否包括对分包单位施工负责人进行安全技术交底，告知危险源、防范措施及事故应急措施。","查阅带班检查记录，是否包含对分包工程的检查情况。","交叉验证：分包合同 ↔ 安全协议 ↔ 资质文件 ↔ 检查记录 ↔ 教育交底记录"],commonIssues:["分包单位资质不满足规定要求","未签安全协议","以包代管"],regulations:"《建设工程安全生产管理条例》第二十四条；《房屋建筑和市政基础设施工程施工分包管理办法》；《建筑施工企业安全生产管理机构设置及专职安全生产管理人员配备办法》"}
];
// ======================= 专职安全员（9项） =======================
defaultData.table3 = [
    {id:"3.1",title:"安全生产教育",content:"核实专职安全生产管理人员是否组织或参与拟定项目安全生产教育和培训计划；是否组织或参与实施项目安全生产教育和培训；是否如实记录安全生产教育和培训情况。",methods:["1.查阅项目年度安全培训计划表。","2.查阅三级安全教育登记卡、培训签到表、考核试卷及影像资料。","3.查阅施工安全日志中每日岗前教育栏的填写情况。"],tips:["检查培训计划是否包含新进场工人、转岗人员及特种作业人员的培训安排。","重点核查培训签到表、考核试卷的笔迹是否一致，防止代签。","核实施工安全日志中是否每日记录了班前教育情况。","交叉验证：培训计划 ↔ 签到表 ↔ 考核试卷 ↔ 施工日志 ↔ 实名制考勤"],commonIssues:["培训记录造假","只有计划无实施","未对新进场工人进行三级教育即上岗"],regulations:"《广东省...通知》第二十五条第（二）项"},
    {id:"3.2",title:"风险辨识与评估",content:"核实专职安全生产管理人员是否组织或参与项目安全风险分级管控和隐患排查治理双重预防工作机制建设；是否开展危险源辨识与评估。",methods:["1.查阅危险源辨识与风险分级管控清单和隐患排查治理清单。","2.查阅风险评估报告或辨识记录表，检查是否有专职安全员签字。","3.现场核查重大风险源（如深基坑、高支模）是否设置告知牌。"],tips:["检查是否建立了动态更新的危险源辨识与风险分级管控清单，包含风险点、等级、管控措施及责任人。","核查现场是否在重大风险区域设置了明显的安全风险告知牌和警示标志。","检查是否随施工进度更新了风险清单。","交叉验证：风险管控清单 ↔ 现场告知牌 ↔ 施工日志 ↔ 现场实体"],commonIssues:["风险清单一成不变未随进度更新","只有清单无现场管控措施或告知牌","未开展危险源辨识或由资料员一人完成"],regulations:"《广东省...通知》第二十五条第（三）项"},
    {id:"3.3",title:"安全隐患排查",content:"核实专职安全生产管理人员是否检查项目安全生产状况；是否及时排查生产安全事故隐患；是否提出改进安全生产管理的建议；施工安全日志填写质量；核实专职安全生产管理人员是否督促落实项目安全生产整改措施；是否按规定对设施、设备进行报验。",methods:["1.现场实地踏勘，观察专职安全员是否在岗巡查。","2.查阅隐患整改通知单。","3.查阅施工安全日志中每日的检查记录。","4.现场核实隐患是否已整改并附整改前后对比照片。","5.查阅设施、设备进场及报审记录"],tips:["检查施工安全日志是否每日连续记录，且记录内容与现场实际进度相符。","核查台账中记录的隐患是否具体（有部位、有描述）。","检查是否实行了整改-复查-销号的闭环流程。","将回复单中的照片与现场实体进行比对，防止假整改、真销号。","交叉验证：施工日志 ↔ 隐患台账 ↔ 现场实体状况"],commonIssues:["日志记录造假","隐患排查走马观花未覆盖重点区域","只查不记或记录与现场不符","未复查即签字销号","设备设施进场未报审"],regulations:"《广东省...通知》第二十五条第（五）项"},
    {id:"3.4",title:"危大工程过程管理",content:"核实专职安全生产管理人员是否确认危大工程施工现场管理人员向作业人员安全技术交底情况；重要部位是否实施旁站管理；是否现场检查危大工程安全专项施工方案实施情况。",methods:["1.查阅危大工程安全技术交底记录，核实专职安全员是否在交底人或监督人栏签字。","2.查阅危大工程验收记录安全员是否签字。","3.查阅施工安全日志中关于危大工程的专项记录。","4.现场核对危大工程的实际施工参数是否与专项方案一致。"],tips:["检查危大工程作业前，专职安全员是否在场监督了安全技术交底过程，并签字确认。","现场实测关键数据（如立杆间距、水平杆步距），对比专项施工方案，核查是否存在两张皮现象。","交叉验证：专项方案 ↔ 交底 ↔ 施工日志 ↔ 现场实测"],commonIssues:["施工方案与现场不符","危大工程验收记录安全员未签字","交底流于形式专职安全员未签字或未监督"],regulations:"《广东省...通知》第二十五条第（三）项"},
    {id:"3.5",title:"应急救援演练",content:"核实专职安全生产管理人员是否组织或参与项目应急救援演练。",methods:["1.查阅演练方案、签到表。","2.查阅演练影像资料（照片/视频）。","3.查阅演练评估总结报告。"],tips:["检查是否至少每半年组织或参与了一次演练。","重点核查是否有演练后的评估总结报告，而非仅有照片。","核实专职安全员在演练中是否担任了具体角色，而非仅负责拍照。","交叉验证：演练方案 ↔ 影像资料 ↔ 评估报告 ↔ 施工日志"],commonIssues:["演练记录造假","演练无评估流于形式","未针对项目特点进行专项演练"],regulations:"《广东省...通知》第二十五条第（四）项"},
    {id:"3.6",title:"违章行为管理",content:"核实专职安全生产管理人员是否及时复核现场安全生产条件；是否制止和纠正违章指挥、强令冒险作业、违反操作规程的行为。",methods:["1.查阅违章违规处罚记录、罚款单或整改通知单等。","2.查阅施工安全日志中关于违章纠正的记录。","3.调取安全检查记录仪视频。"],tips:["根据规定，专职安全员应佩戴记录仪，核查视频中是否有制止违章的画面。","重点检查施工安全日志中专职安全员是否开展岗前巡查。","核实违章行为是否有书面记录（照片、单据）存档。","交叉验证：违章记录 ↔ 施工日志 ↔ 记录仪视频 ↔ 现场人员访谈"],commonIssues:["对违章行为未进行制止和纠正","有制止行为但无书面记录或视频证据","未进行每日开工前的安全岗前巡查"],regulations:"《广东省...通知》第二十五条第（六）项"},
    {id:"3.7",title:"施工安全日志",content:"核实专职安全生产管理人员是否每日填写施工安全日志；日志内容是否包含岗前巡查、岗前教育、危大工程、高风险作业、重大事故隐患排查治理等；是否由项目负责人签字确认。",methods:["1.查阅每日的施工安全日志。","2.对比现场实际施工进度与日志记录内容的一致性。","3.核查项目负责人（项目经理）的签字确认情况。"],tips:["重点核查日志中是否详细记录了岗前巡查（含安全防护、临时用电、消防）、岗前教育（班前喊话、防护用品检查）等内容。","核查是否对排查出的房屋市政工程生产安全重大事故隐患进行了专项记录和闭环管理。","核查施工安全日志中是否有项目负责人（项目经理）签字确认。","交叉验证：施工安全日志 ↔ 现场实体状况 ↔ 记录仪视频"],commonIssues:["日志记录造假","记录内容空洞未包含岗前巡查、教育等关键要素","未按要求每日记录"],regulations:"《广东省...通知》第三十四条、第四十条"},
    {id:"3.8",title:"安全生产检查记录仪佩戴与使用",content:"核实专职安全生产管理人员在岗履职期间是否佩戴安全生产检查记录仪；是否全过程视频记录在岗履职情况；是否存在对视频资料进行编辑、篡改的行为。",methods:["1.现场检查专职安全员是否随身佩戴记录仪。","2.登录企业或项目视频管理平台，抽查回放专职安全员的履职视频记录。","3.检查企业对记录仪视频资料的存储管理情况。"],tips:["重点核查在进行隐患排查、违章制止、危大工程监督等关键环节时，是否开启记录仪。","严禁任何人对视频资料进行编辑、篡改。","核实原始视频资料是否至少留档保存6个月。","交叉验证：现场佩戴情况 ↔ 视频回放记录 ↔ 施工安全日志时间点"],commonIssues:["未按规定佩戴记录仪","有设备但未开启或仅在检查时临时开启","视频资料缺失或存储时间不足"],regulations:"《广东省...通知》第三十五条"},
    {id:"3.9",title:"日常安全检查与隐患处理（补充）",content:"此条为补充项，确保安全员每日检查、隐患处理全面覆盖。",methods:["查阅日常检查记录，核实是否覆盖所有作业区域。","核对隐患处理时效性。"],tips:["确保每日检查有记录，隐患有跟踪。"],commonIssues:["检查记录不连续","隐患整改超期"],regulations:"《建筑施工安全检查标准》JGJ59"}
];

defaultData.table4 = [
    {id:"4.1",title:"执业资格",content:"查阅证书，核实总监理工程师是否按规定取得注册执业资格，是否在岗履职，不得违反规定受聘于两个及以上单位从事执业活动。",methods:["1.查阅注册监理工程师证书原件。","2.通过全国建筑市场监管公共服务平台查询注册信息。","3.查阅考勤记录。","4.查询其名下其他项目任职情况。"],tips:["必须看原件，当场用手机查询验证。","查注册专业、注册单位、有效期。","查总监签字的文件、会议记录。","平台查询同一人注册项目数量（不得超过3个）。","交叉验证：证书 ↔ 平台查询 ↔ 签字文件 ↔ 考勤 ↔ 会议记录。"],commonIssues:["证书挂靠","长期不在岗","同时担任超过三个项目总监","签字弄虚作假"],regulations:"《建筑工程项目总监理工程师质量安全责任六项规定》一；《注册监理工程师管理规定》；《建设工程监理规范》GB/T50319"},
    {id:"4.2",title:"监理规划与细则",content:"查阅监理规划及实施细则，核实是否编制包括安全监理内容的项目监理规划，对中型及以上项目和危大工程是否编制监理实施细则。",methods:["1.查阅监理规划审批记录。","2.查阅安全监理实施细则。","3.核对编制时间与开工时间。","4.查阅危大工程监理细则。"],tips:["监理规划应在签订监理合同及收到设计文件后编制，开工前完成。","查安全监理目标、内容、方法、措施。","中型及以上项目、危大工程必须编制安全监理实施细则。","交叉验证：监理规划 ↔ 监理细则 ↔ 审批记录 ↔ 开工时间 ↔ 项目规模。"],commonIssues:["监理规划无安全内容","编制时间滞后","应编细则未编制","细则照搬模板缺乏针对性"],regulations:"《建设工程安全生产管理条例》第十四条；《关于落实建设工程安全生产监理责任的若干意见》一（一）；《建筑工程项目总监理工程师质量安全责任六项规定》二；《建设工程监理规范》GB/T50319"},
    {id:"4.3",title:"施工组织设计与专项施工方案审查",content:"查阅审查意见，核实是否组织审查施工单位提交的施工组织设计中的安全技术措施或专项施工方案是否符合工程建设强制性标准，审查后是否有总监理工程师签字。",methods:["1.查阅施工组织设计报审表。","2.查阅专项施工方案报审表。","3.核对总监签字。","4.查阅审查意见及修改回复。"],tips:["查施工单位报审→专业监理工程师审查→总监审核签字。","查是否符合强制性标准、是否有针对性、是否可行。","对比总监多处签字，必要时现场验证。","查审查意见是否有修改、修改后是否重新审查。","交叉验证：审查表 ↔ 审查意见 ↔ 修改回复 ↔ 总监签字 ↔ 方案实施。"],commonIssues:["审查流于形式","总监未签字、未加盖注册章","审查意见未落实","方案修改后未重新审查"],regulations:"《建设工程安全生产管理条例》第十四条；《关于落实建设工程安全生产监理责任的若干意见》一（一）；《建筑工程项目总监理工程师质量安全责任六项规定》二"},
    {id:"4.4",title:"应急预案审查",content:"查阅审查记录，核实是否审核施工单位应急救援预案。",methods:["1.查阅应急预案审查记录。","2.查阅审查意见。"],tips:["查预案内容、针对性、可行性、评审记录。","查审查意见是否具体、是否有修改要求。","查总监签字、审查时间。","交叉验证：预案报审 ↔ 审查记录 ↔ 审查意见 ↔ 总监签字。"],commonIssues:["预案审查流于形式","无总监签字"],regulations:"《关于落实建设工程安全生产监理责任的若干意见》一（一）；《建设工程监理规范》GB/T50319；《生产安全事故应急预案管理办法》"},
    {id:"4.5",title:"分包资质审查",content:"查阅审查记录，核实是否组织审查施工单位报审的分包单位资格，发现转包和违法分包是否及时向建设单位和有关主管部门报告。",methods:["1.查阅分包单位资格报审表。","2.查阅转包违法分包报告记录。"],tips:["查分包单位资质、安全生产许可证、人员资格。","查分包单位是否实际施工、管理人员是否到位。","交叉验证：资质报审 ↔ 审查记录 ↔ 现场核实 ↔ 报告记录 ↔ 主管部门回复。"],commonIssues:["资质审查不严","转包违法分包未识别","发现问题未报告","报告不及时"],regulations:"《建设工程安全生产管理条例》第十四条；《建筑工程项目总监理工程师质量安全责任六项规定》二；《房屋建筑和市政基础设施工程施工分包管理办法》"},
    {id:"4.6",title:"特种作业人员核查",content:"查阅记录，审核特种作业人员操作资格证书是否合法有效。",methods:["1.查阅特种作业人员资格报审表。","2.现场抽查持证上岗情况。"],tips:["抽查现场特种作业人员证书是否真实且在有效期内。","报审表是否有总监签字确认。","询问总监核查人员证书真伪方法。","交叉验证：报审表 ↔ 证书查询 ↔ 现场人员 ↔ 考勤记录。"],commonIssues:["证书造假","证书过期","人证不符","无证上岗"],regulations:"《关于落实建设工程安全生产监理责任的若干意见》一（一）；《建筑工程项目总监理工程师质量安全责任六项规定》二；《特种作业人员安全技术培训考核管理规定》"},
    {id:"4.7",title:"监理过程实施方式",content:"查阅监理日志，核实是否组织项目监理人员采取旁站、巡视和平行检验等形式实施工过程监理。",methods:["1.查阅监理日志。","2.查阅旁站记录。","3.查阅巡视记录。","4.查阅平行检验记录。","5.核对实施频次。"],tips:["查危大工程、关键部位是否有旁站记录。","查监理日志与旁站、巡视记录，必要时可抽查施工日志、安全日志验证。","交叉验证：监理日志 ↔ 旁站记录 ↔ 巡视记录 ↔ 平行检验记录 ↔ 施工记录。"],commonIssues:["旁站记录缺失","巡视频次不足","平行检验未做","记录弄虚作假"],regulations:"《建筑工程项目总监理工程师质量安全责任六项规定》三；《建设工程监理规范》GB/T50319；《房屋建筑工程施工旁站监理管理办法》"},
    {id:"4.8",title:"材料进场检查",content:"查阅检查记录，核实是否按照规定对施工单位报审的建筑材料、建筑构配件进行检查，不得将不合格材料按合格签字。",methods:["1.查阅材料报审表。","2.查阅进场验收记录。","3.查阅不合格材料处理记录。","4.核对监理签字。"],tips:["查施工单位报审→监理审查→签字确认。","查监理是否参与进场验收。","查不合格材料退场记录、监理见证退场记录。","对比监理多处签字核实签字真实性。","交叉验证：报审表 ↔ 验收记录 ↔ 不合格处理 ↔ 监理签字 ↔ 现场材料。"],commonIssues:["未经审查或检验合格先使用","不合格材料未退场","签字弄虚作假","验收记录缺失"],regulations:"《建筑工程项目总监理工程师质量安全责任六项规定》三；《建设工程监理规范》GB/T50319；《建设工程质量管理条例》第三十七条"},

// ======================= 全局变量与函数 =======================
let inspectionData = JSON.parse(JSON.stringify(defaultData));
const tableOrder = ['table1','table2','table3','table4','table5'];
let currentTableIndex = 0;

function saveToLocal() { 
    localStorage.setItem('inspectionData', JSON.stringify(inspectionData));
    // 同时保存检查结果状态
    const results = [];
    document.querySelectorAll('.inspection-item').forEach(item => {
        const result = item.querySelector('input[name^="result"]:checked');
        if (result) {
            results.push({
                table: item.dataset.table,
                itemId: item.dataset.item,
                result: result.value,
                remark: item.querySelector('.remark-input')?.value || ''
            });
        }
    });
    const checkInfo = {
        unit: document.getElementById('checkUnit').value,
        checker: document.getElementById('checkerName').value,
        date: document.getElementById('checkDate').value,
        project: document.getElementById('projectName').value,
        checkedUnit: document.getElementById('checkedUnit').value,
        type: document.getElementById('checkType').value
    };
    localStorage.setItem('savedCheckData', JSON.stringify({ checkInfo, results }));
}

function loadSavedData() {
    const saved = localStorage.getItem('savedCheckData');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            if (data.checkInfo) {
                if (data.checkInfo.unit) document.getElementById('checkUnit').value = data.checkInfo.unit;
                if (data.checkInfo.checker) document.getElementById('checkerName').value = data.checkInfo.checker;
                if (data.checkInfo.date) document.getElementById('checkDate').value = data.checkInfo.date;
                if (data.checkInfo.project) document.getElementById('projectName').value = data.checkInfo.project;
                if (data.checkInfo.checkedUnit) document.getElementById('checkedUnit').value = data.checkInfo.checkedUnit;
                if (data.checkInfo.type) document.getElementById('checkType').value = data.checkInfo.type;
            }
            // 结果将在表格渲染完成后恢复
            window._savedResults = data.results;
        } catch(e) {}
    }
}

function renderCommonIssues(tableId, itemId) {
    const item = inspectionData[tableId].find(i => i.id === itemId);
    if (!item) return;
    const container = document.getElementById(`issues-${tableId}-${itemId}`);
    if (!container) return;
    container.innerHTML = `
        <div class="common-issues-container">
            ${item.commonIssues.map(issue => `<span class="issue-tag" onclick="addIssueToRemarkAndNoncompliant('${tableId}','${itemId}','${issue.replace(/'/g, "\\'")}')">${issue}</span>`).join('')}
            <div class="add-issue-input"><input type="text" placeholder="添加新问题..." id="new-issue-${tableId}-${itemId}"><button onclick="addCustomIssue('${tableId}','${itemId}')">➕</button></div>
        </div>
    `;
}

function addCustomIssue(tableId, itemId) {
    const input = document.getElementById(`new-issue-${tableId}-${itemId}`);
    if (input && input.value.trim()) {
        const newIssue = input.value.trim();
        const item = inspectionData[tableId].find(i => i.id === itemId);
        if (item && !item.commonIssues.includes(newIssue)) {
            item.commonIssues.push(newIssue);
            saveToLocal();
            renderCommonIssues(tableId, itemId);
        }
        input.value = '';
    }
}

function addIssueToRemarkAndNoncompliant(tableId, itemId, issue) {
    const itemDiv = document.querySelector(`[data-table="${tableId}"][data-item="${itemId}"]`);
    if (!itemDiv) return;
    const remark = itemDiv.querySelector('.remark-input');
    const noncompliantRadio = itemDiv.querySelector('input[value="noncompliant"]');
    if (remark && !remark.value.includes(issue)) {
        remark.value = remark.value ? remark.value + '\n' + issue : issue;
    }
    if (noncompliantRadio) {
        noncompliantRadio.checked = true;
        updateItemStatus(tableId, itemId, 'noncompliant');
        updateSummary();
    }
    itemDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateItemStatus(tableId, itemId, status) {
    const item = document.querySelector(`[data-table="${tableId}"][data-item="${itemId}"]`);
    if (item) item.dataset.status = status;
    updateTableProgress(tableId);
    saveToLocal();
}

function updateTableProgress(tableId) {
    const container = document.getElementById(`${tableId}-container`);
    if (!container) return;
    const items = container.querySelectorAll('.inspection-item');
    const completed = Array.from(items).filter(i => i.dataset.status !== 'pending').length;
    const progress = (completed / items.length) * 100;
    const fill = document.getElementById(`${tableId}-progress`);
    if (fill) fill.style.width = `${progress}%`;
    const text = document.getElementById(`${tableId}-progress-text`);
    if (text) text.textContent = `${completed}/${items.length}`;
}

function getTableTitle(tableId) {
    const titles = { table1:'建设单位项目负责人（10项）', table2:'施工单位项目经理（13项）', table3:'专职安全员（9项）', table4:'总监理工程师（12项）', table5:'安全专业监理工程师（10项）' };
    return titles[tableId];
}

function filterItems(tableId, filter, btn) {
    const container = document.getElementById(`${tableId}-container`);
    if (!container) return;
    container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    container.querySelectorAll('.inspection-item').forEach(item => {
        const status = item.dataset.status;
        item.style.display = (filter === 'all' || status === filter) ? 'block' : 'none';
    });
}

function selectAll(tableId, status) {
    const container = document.getElementById(`${tableId}-container`);
    if (!container) return;
    container.querySelectorAll('.inspection-item').forEach(item => {
        const radio = item.querySelector(`input[value="${status}"]`);
        if (radio) { radio.checked = true; updateItemStatus(tableId, item.dataset.item, status); }
    });
    updateSummary();
}

function clearTable(tableId) {
    if (!confirm('确定清空该表格所有选择吗？')) return;
    const container = document.getElementById(`${tableId}-container`);
    if (!container) return;
    container.querySelectorAll('.inspection-item').forEach(item => {
        item.dataset.status = 'pending';
        item.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        item.querySelector('.remark-input').value = '';
    });
    updateTableProgress(tableId);
    updateSummary();
    saveToLocal();
}

function goToNextItem(tableId, currentIndex) {
    const data = inspectionData[tableId];
    if (currentIndex < data.length - 1) {
        const nextItem = document.getElementById(`item-${tableId}-${currentIndex+1}`);
        if (nextItem) nextItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
        const idx = tableOrder.indexOf(tableId);
        if (idx < tableOrder.length - 1 && confirm('当前表格已检查完毕，是否进入下一张表？')) {
            navigateTable(1);
        } else {
            alert('所有检查项已完成！');
        }
    }
}

function navigateTable(delta) {
    const newIdx = currentTableIndex + delta;
    if (newIdx < 0 || newIdx >= tableOrder.length) return;
    const currentTable = tableOrder[currentTableIndex];
    const container = document.getElementById(`${currentTable}-container`);
    const items = container.querySelectorAll('.inspection-item');
    const completed = Array.from(items).filter(i => i.dataset.status !== 'pending').length;
    if (delta > 0 && completed < items.length && !confirm(`当前表格还有 ${items.length - completed} 项未完成，确定进入下一表？`)) return;
    currentTableIndex = newIdx;
    const newTable = tableOrder[currentTableIndex];
    document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
    document.querySelector(`.nav-tab[data-table="${newTable}"]`).classList.add('active');
    document.querySelectorAll('.table-container, .summary-panel').forEach(el => el.classList.add('hidden'));
    if (newTable === 'summary') {
        document.getElementById('summary-container').classList.remove('hidden');
        updateSummary();
    } else {
        document.getElementById(`${newTable}-container`).classList.remove('hidden');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateSummary() {
    let total = 0, completed = 0, compliant = 0, noncompliant = 0, notapp = 0;
    const ncByResp = { table1:[], table2:[], table3:[], table4:[], table5:[] };
    document.querySelectorAll('.inspection-item').forEach(item => {
        total++;
        const result = item.querySelector('input[name^="result"]:checked');
        if (result) {
            completed++;
            if (result.value === 'compliant') compliant++;
            else if (result.value === 'noncompliant') {
                noncompliant++;
                const title = item.querySelector('.item-title').textContent;
                const id = item.dataset.item;
                const remark = item.querySelector('.remark-input').value;
                const tid = item.dataset.table;
                ncByResp[tid].push({ id, title, remark });
            } else if (result.value === 'notapplicable') notapp++;
        }
    });
    document.getElementById('total-items').innerText = total;
    document.getElementById('completed-items').innerText = completed;
    document.getElementById('compliant-items').innerText = compliant;
    document.getElementById('noncompliant-items').innerText = noncompliant;
    document.getElementById('notapplicable-items').innerText = notapp;
    document.getElementById('completion-rate').innerText = total ? Math.round(completed/total*100)+'%' : '0%';
    const respNames = { table1:'建设单位项目负责人', table2:'施工单位项目经理', table3:'专职安全员', table4:'总监理工程师', table5:'安全专业监理工程师' };
    const groupsDiv = document.getElementById('responsibility-groups');
    groupsDiv.innerHTML = '<h3 style="margin-bottom:20px;color:#c53030;">📋 各责任人员不符合项清单</h3>';
    let hasAny = false;
    tableOrder.forEach(tid => {
        if (ncByResp[tid].length) {
            hasAny = true;
            groupsDiv.innerHTML += `<div class="responsibility-group"><h4>🏢 ${respNames[tid]} <span class="issue-count">${ncByResp[tid].length}项</span></h4>${ncByResp[tid].map(it => `<div class="noncompliant-item"><strong>${it.id}</strong><div>${it.title}</div>${it.remark ? `<div class="item-remark">📝 备注：${it.remark}</div>` : ''}</div>`).join('')}</div>`;
        }
    });
    if (!hasAny) groupsDiv.innerHTML += '<p class="no-issues">✅ 所有责任人员均无不符合项</p>';
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

function toggleEdit(tableId, itemId) {
    const btn = event.target;
    const titleEl = document.getElementById(`title-${tableId}-${itemId}`);
    const contentEl = document.getElementById(`content-${tableId}-${itemId}`);
    const methodsEl = document.getElementById(`methods-${tableId}-${itemId}`);
    const tipsEl = document.getElementById(`tips-${tableId}-${itemId}`);
    const regulationsEl = document.getElementById(`regulations-${tableId}-${itemId}`);
    const issuesContainer = document.getElementById(`issues-${tableId}-${itemId}`);
    const isEditing = btn.classList.contains('active');
    if (isEditing) {
        const item = inspectionData[tableId].find(i => i.id === itemId);
        if (item) {
            item.title = titleEl.textContent.trim();
            item.content = contentEl.textContent.trim();
            item.methods = Array.from(methodsEl.querySelectorAll('li')).map(li => li.textContent.trim());
            item.tips = Array.from(tipsEl.querySelectorAll('li')).map(li => li.textContent.trim());
            item.regulations = regulationsEl.textContent.trim();
            const editableDiv = issuesContainer.querySelector('.common-issues-editable');
            if (editableDiv) {
                item.commonIssues = editableDiv.textContent.split(/[，,]+/).map(s => s.trim()).filter(s => s);
            }
            saveToLocal();
            inspectionData[tableId] = inspectionData[tableId]; // 触发更新
        }
        titleEl.contentEditable = 'false';
        contentEl.contentEditable = 'false';
        methodsEl.contentEditable = 'false';
        tipsEl.contentEditable = 'false';
        regulationsEl.contentEditable = 'false';
        renderCommonIssues(tableId, itemId);
        btn.classList.remove('active');
        btn.textContent = '✏️ 编辑';
    } else {
        titleEl.contentEditable = 'true';
        contentEl.contentEditable = 'true';
        methodsEl.contentEditable = 'true';
        tipsEl.contentEditable = 'true';
        regulationsEl.contentEditable = 'true';
        const currentIssues = inspectionData[tableId].find(i => i.id === itemId)?.commonIssues || [];

        editableDiv.className = 'common-issues-editable';
        editableDiv.contentEditable = 'true';

        editableDiv.style.padding = '8px';
        editableDiv.style.borderRadius = '8px';
        editableDiv.style.minHeight = '60px';
        editableDiv.textContent = currentIssues.join(', ');

        btn.classList.add('active');
        btn.textContent = '💾 保存';
    }

function handleImportFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (confirm('导入将覆盖当前的检查结果、备注及检查单位信息。是否继续？')) {
                if (imported.checkInfo) {
                    if (imported.checkInfo.unit) document.getElementById('checkUnit').value = imported.checkInfo.unit;
                    if (imported.checkInfo.checker) document.getElementById('checkerName').value = imported.checkInfo.checker;
                    if (imported.checkInfo.date) document.getElementById('checkDate').value = imported.checkInfo.date;
                    if (imported.checkInfo.project) document.getElementById('projectName').value = imported.checkInfo.project;
                    if (imported.checkInfo.checkedUnit) document.getElementById('checkedUnit').value = imported.checkInfo.checkedUnit;
                    if (imported.checkInfo.type) document.getElementById('checkType').value = imported.checkInfo.type;
                }
                if (imported.results && Array.isArray(imported.results)) {
                    document.querySelectorAll('.inspection-item').forEach(item => {
                        item.dataset.status = 'pending';
                        item.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
                        const remarkTextarea = item.querySelector('.remark-input');
                        if (remarkTextarea) remarkTextarea.value = '';
                    });
                    imported.results.forEach(res => {
                        const targetRadio = document.querySelector(`[data-table="${res.table}"][data-item="${res.itemId}"] input[value="${res.result}"]`);
                        if (targetRadio) {
                            targetRadio.checked = true;
                            const itemDiv = targetRadio.closest('.inspection-item');
                            if (itemDiv) itemDiv.dataset.status = res.result;
                        }
                        const targetRemark = document.querySelector(`[data-table="${res.table}"][data-item="${res.itemId}"] .remark-input`);
                        if (targetRemark && res.remark) targetRemark.value = res.remark;
                    });
                    tableOrder.forEach(tid => updateTableProgress(tid));
                    updateSummary();
                    saveToLocal();
                    alert('导入成功！');
                } else {
                    alert('导入文件格式不正确，缺少 results 字段。');
                }
            }
        } catch(err) {
            alert('导入失败，文件格式错误：' + err.message);
        }
        input.value = '';
    };
    reader.readAsText(file, 'UTF-8');
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    // 尝试从 localStorage 加载完整数据
    const savedData = localStorage.getItem('inspectionData');
    if (savedData) {
        try {
            const parsed = JSON.parse(savedData);
            // 合并数据，确保所有字段完整
            for (let tid of tableOrder) {
                if (parsed[tid] && Array.isArray(parsed[tid])) {
                    for (let i = 0; i < parsed[tid].length; i++) {
                        const oldItem = parsed[tid][i];
                        const defaultItem = defaultData[tid].find(d => d.id === oldItem.id);
                        if (defaultItem) {
                            if (!oldItem.content) oldItem.content = defaultItem.content;
                            if (!oldItem.methods || !oldItem.methods.length) oldItem.methods = defaultItem.methods;
                            if (!oldItem.tips || !oldItem.tips.length) oldItem.tips = defaultItem.tips;
                            if (!oldItem.commonIssues || !oldItem.commonIssues.length) oldItem.commonIssues = defaultItem.commonIssues;
                            if (!oldItem.regulations) oldItem.regulations = defaultItem.regulations;
                        }
                    }
                    inspectionData[tid] = parsed[tid];
                } else {
                    inspectionData[tid] = defaultData[tid];
                }
            }
        } catch(e) { console.warn(e); }
    } else {
        inspectionData = JSON.parse(JSON.stringify(defaultData));
    }
    document.getElementById('checkDate').valueAsDate = new Date();
    tableOrder.forEach(renderInspectionItems);
    loadSavedData();
    restoreSavedResults();
    document.getElementById('table1-container').classList.remove('hidden');
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            const tid = this.dataset.table;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.table-container, .summary-panel').forEach(el => el.classList.add('hidden'));
            if (tid === 'summary') {
                document.getElementById('summary-container').classList.remove('hidden');
                updateSummary();
            } else {
                currentTableIndex = tableOrder.indexOf(tid);
                document.getElementById(`${tid}-container`).classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });
});
</script>
</body>
</html>
</script>
